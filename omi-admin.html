<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#F2C12E;--gold2:#C99D1F;--gold3:rgba(242,193,46,.12);
  --dark:#050e08;--dark2:#0a1810;--dark3:#0d1f14;
  --text:#e8dfc8;--text2:rgba(232,223,200,.55);--text3:rgba(232,223,200,.25);
  --border:rgba(242,193,46,.1);--border2:rgba(242,193,46,.22);
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --green:#4ade80;--orange:#f97316;--blue:#3b82f6;--red:#ef4444;
  --nav-h:60px;--header-h:58px;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden}
button,input,textarea,select{font-family:'Nunito',sans-serif;-webkit-appearance:none;border:none;outline:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 100% 50% at 50% -5%,rgba(242,193,46,.05),transparent 60%);z-index:0}

/* ── HEADER ── */
.app-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:200;
  background:rgba(5,14,8,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px}
.app-logo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;
  color:var(--gold);letter-spacing:.04em;flex:1;line-height:1}
.app-logo span{display:block;font-size:.5rem;color:var(--text2);letter-spacing:.18em;
  font-family:'DM Mono',monospace;margin-top:2px;font-weight:400}
.header-badge{background:var(--gold);color:var(--dark);font-size:.6rem;font-weight:900;
  min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;padding:0 5px;flex-shrink:0;transition:.3s}
.header-badge.zero{background:rgba(255,255,255,.07);color:var(--text3)}
.sound-btn{width:34px;height:34px;border-radius:50%;background:rgba(242,193,46,.07);
  border:1px solid rgba(242,193,46,.14);display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;transition:.2s;color:var(--gold)}
.sound-btn.muted{opacity:.3}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);z-index:200;
  background:rgba(5,14,8,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;border:none;background:none;
  color:var(--text3);transition:.2s;position:relative}
.nav-item.active{color:var(--gold)}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.nav-label{font-size:.52rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
.nav-dot{position:absolute;top:8px;right:calc(50% - 16px);width:8px;height:8px;
  border-radius:50%;background:var(--gold);border:2px solid var(--dark);
  display:none;animation:pulse-dot 1.5s ease-in-out infinite}
.nav-dot.show{display:block}

/* ── PAGES ── */
.page{position:fixed;top:var(--header-h);bottom:var(--nav-h);left:0;right:0;
  overflow-y:auto;display:none}
.page.active{display:block}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:rgba(242,193,46,.12);border-radius:2px}

/* ── PEDIDOS PAGE ── */
.order-tabs{display:flex;padding:10px 12px 0;gap:6px;background:rgba(5,14,8,.6);
  position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)}
.order-tab{flex:1;padding:11px 4px;font-size:.68rem;font-weight:900;letter-spacing:.1em;
  color:var(--text2);border:1px solid transparent;border-radius:var(--radius-xs);
  background:rgba(242,193,46,.03);cursor:pointer;transition:.2s;text-transform:uppercase}
.order-tab.active{color:var(--gold);border-color:rgba(242,193,46,.25);background:rgba(242,193,46,.08)}
.order-tab-badge{display:inline-flex;align-items:center;justify-content:center;
  background:var(--gold);color:var(--dark);font-size:.5rem;font-weight:900;
  min-width:15px;height:15px;border-radius:8px;padding:0 3px;margin-left:3px;vertical-align:middle}
.order-tab-badge:empty{display:none}
.orders-list{padding:10px 12px 16px}

/* ORDER CARD */
.order-card{background:linear-gradient(155deg,rgba(13,31,20,.96),rgba(7,15,9,.96));
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:8px;overflow:hidden;transition:.2s}
.order-card.novo{border-color:rgba(242,193,46,.38);box-shadow:0 2px 16px rgba(242,193,46,.08)}
.order-card.em_preparo{border-color:rgba(249,115,22,.28)}
.order-card.saiu{border-color:rgba(59,130,246,.28)}
.order-card.entregue{border-color:rgba(74,222,128,.15);opacity:.55}
.card-head{padding:11px 14px 9px;display:flex;align-items:flex-start;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.04)}
.card-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-novo{background:var(--gold);animation:pulse-dot 1.5s infinite}
.dot-em_preparo{background:var(--orange)}
.dot-saiu{background:var(--blue)}
.dot-entregue{background:var(--green)}
.card-info{flex:1;min-width:0}
.card-nome{font-weight:900;font-size:.85rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.card-id{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--text3)}
.card-tempo{font-size:.58rem;color:var(--text2);font-family:'DM Mono',monospace}
.card-tempo.urgente{color:var(--orange)}
.card-stag{font-size:.5rem;font-weight:900;letter-spacing:.1em;padding:2px 6px;border-radius:4px}
.st-novo{background:rgba(242,193,46,.15);color:var(--gold)}
.st-em_preparo{background:rgba(249,115,22,.15);color:var(--orange)}
.st-saiu{background:rgba(59,130,246,.15);color:var(--blue)}
.st-entregue{background:rgba(74,222,128,.12);color:var(--green)}
.card-total{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--gold);flex-shrink:0}
.card-body{padding:9px 14px}
.card-item{display:flex;justify-content:space-between;align-items:baseline;
  padding:3px 0;font-size:.76rem;color:var(--text);border-bottom:1px solid rgba(255,255,255,.03)}
.card-item:last-child{border:none}
.card-item-qty{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);margin-right:5px}
.card-item-preco{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--text2)}
.card-info-row{margin-top:6px;padding:5px 9px;border-radius:6px;
  font-size:.64rem;color:var(--text2);display:flex;align-items:center;gap:6px}
.card-info-row.pagto{background:rgba(242,193,46,.05);border:1px solid rgba(242,193,46,.1)}
.card-info-row.end{background:rgba(255,255,255,.025)}
.card-actions{padding:9px 14px;display:flex;gap:7px;border-top:1px solid rgba(255,255,255,.04)}
.act-btn{flex:1;padding:9px 6px;border-radius:var(--radius-xs);font-size:.64rem;
  font-weight:900;letter-spacing:.06em;cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:4px;border:1px solid transparent}
.act-preparo{background:rgba(249,115,22,.12);color:var(--orange);border-color:rgba(249,115,22,.25)}
.act-aceitar{background:rgba(74,222,128,.12);color:var(--green);border-color:rgba(74,222,128,.28)}
.act-recusar{background:rgba(248,113,113,.1);color:#f87171;border-color:rgba(248,113,113,.28)}
.act-cancelar{background:rgba(248,113,113,.08);color:#f87171;border-color:rgba(248,113,113,.22)}
.act-saiu{background:rgba(59,130,246,.12);color:var(--blue);border-color:rgba(59,130,246,.25)}
.act-entregue{background:rgba(74,222,128,.1);color:var(--green);border-color:rgba(74,222,128,.2)}
.act-chat{background:rgba(242,193,46,.07);color:var(--gold);border-color:rgba(242,193,46,.18);
  flex:0 0 44px;border-radius:var(--radius-xs);cursor:pointer}
.act-chat.unread{background:rgba(242,193,46,.25);color:var(--gold);border-color:var(--gold);
  animation:chatPulse 1.2s ease-in-out infinite;position:relative}
.act-chat.unread::after{content:'';position:absolute;top:-3px;right:-3px;width:8px;height:8px;
  border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
@keyframes chatPulse{0%,100%{box-shadow:0 0 0 0 rgba(242,193,46,.4)}50%{box-shadow:0 0 0 5px rgba(242,193,46,0)}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:12px;opacity:.3}
.empty-icon{font-size:2.5rem}
.empty-txt{font-size:.7rem;color:var(--text2);letter-spacing:.14em;font-family:'DM Mono',monospace}

/* ── CLIENTES PAGE ── */
.page-pad{padding:14px 12px}
.search-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);
  border:1px solid rgba(242,193,46,.14);border-radius:var(--radius-sm);
  padding:10px 14px;margin-bottom:12px}
.search-bar input{flex:1;background:none;color:var(--text);font-size:.82rem}
.search-bar input::placeholder{color:var(--text3)}
.cliente-card{background:rgba(10,28,17,.8);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.cliente-card:active{border-color:rgba(242,193,46,.3);background:rgba(10,28,17,.95)}
.cli-top{display:flex;align-items:center;gap:10px}
.cli-avatar{width:36px;height:36px;border-radius:50%;background:rgba(242,193,46,.1);
  border:1px solid rgba(242,193,46,.2);display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);flex-shrink:0}
.cli-info{flex:1;min-width:0}
.cli-nome{font-weight:900;font-size:.85rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cli-sub{font-size:.6rem;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace}
.cli-badge{font-size:.52rem;font-weight:900;padding:2px 7px;border-radius:10px;flex-shrink:0}
.cli-badge.membro{background:rgba(242,193,46,.18);color:var(--gold);border:1px solid rgba(242,193,46,.3)}
.cli-badge.normal{background:rgba(255,255,255,.06);color:var(--text2)}
.cli-stats{display:flex;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)}
.cli-stat{flex:1;text-align:center}
.cli-stat-val{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--gold);font-weight:500}
.cli-stat-lbl{font-size:.52rem;color:var(--text3);margin-top:1px;letter-spacing:.08em}

/* ── RELATÓRIOS PAGE ── */
.rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.rel-card{background:rgba(10,28,17,.8);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;text-align:center}
.rel-val{font-family:'DM Mono',monospace;font-size:1.4rem;color:var(--gold);font-weight:500;line-height:1}
.rel-lbl{font-size:.55rem;color:var(--text2);letter-spacing:.12em;margin-top:6px;text-transform:uppercase}
.rel-card.wide{grid-column:1/-1}
.section-title{font-size:.58rem;font-weight:900;letter-spacing:.16em;color:var(--text2);
  text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px;margin-top:16px}
.top-item{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.top-item:last-child{border:none}
.top-rank{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--gold);width:20px;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-nome{font-weight:700;font-size:.78rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:.6rem;color:var(--text2);margin-top:1px}
.top-val{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--gold);flex-shrink:0}

/* ── O-MI IA PAGE ── */
.omi-page{display:flex;flex-direction:column;height:100%}
.omi-msgs-wrap{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
.omi-msgs-wrap::-webkit-scrollbar{width:3px}
.omi-msgs-wrap::-webkit-scrollbar-thumb{background:rgba(242,193,46,.1);border-radius:2px}
.omi-bubble{max-width:82%;border-radius:14px;padding:10px 13px;font-size:.79rem;line-height:1.65;color:var(--text)}
.omi-bubble.omi{align-self:flex-start;background:rgba(10,28,17,.9);border:1px solid rgba(242,193,46,.1);
  border-bottom-left-radius:3px;display:flex;gap:8px;align-items:flex-start}
.omi-bubble-av{width:28px;height:28px;border-radius:50%;background:rgba(242,193,46,.1);
  border:1px solid rgba(242,193,46,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.omi-bubble-txt{flex:1}
.omi-bubble.user{align-self:flex-end;background:linear-gradient(135deg,rgba(242,193,46,.18),rgba(242,193,46,.09));
  border:1px solid rgba(242,193,46,.28);border-bottom-right-radius:3px}
.omi-typing{align-self:flex-start;background:rgba(10,28,17,.9);border:1px solid rgba(242,193,46,.1);
  border-radius:14px 14px 14px 3px;padding:10px 16px}
.omi-dots{display:flex;gap:5px;align-items:center}
.omi-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);
  animation:omi-blink 1.2s ease-in-out infinite}
.omi-dots span:nth-child(2){animation-delay:.2s}
.omi-dots span:nth-child(3){animation-delay:.4s}
.omi-sugg{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.omi-sugg-btn{padding:9px 14px;background:rgba(242,193,46,.04);border:1px solid rgba(242,193,46,.12);
  border-radius:10px;color:rgba(232,223,200,.65);font-size:.75rem;text-align:left;
  cursor:pointer;font-weight:700;transition:.2s}
.omi-sugg-btn:active{background:rgba(242,193,46,.1);color:var(--text)}
.omi-input-bar{padding:10px 12px;border-top:1px solid var(--border);
  background:rgba(5,14,8,.7);display:flex;gap:8px;flex-shrink:0}
.omi-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(242,193,46,.14);
  border-radius:18px;padding:11px 14px;color:var(--text);font-size:.8rem;
  resize:none;line-height:1.5;transition:border-color .2s;max-height:80px}
.omi-input:focus{border-color:rgba(242,193,46,.35)}
.omi-send{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;transition:.2s;align-self:flex-end}
.omi-send:disabled{background:rgba(242,193,46,.12);cursor:default}

/* ── CHAT PANEL ── */
.chat-panel{position:fixed;inset:0;z-index:300;background:linear-gradient(170deg,#0b2016,#040d08);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.chat-panel.open{transform:translateY(0)}
.chat-hd{padding:14px 16px;border-bottom:1px solid var(--border);
  background:rgba(5,14,8,.75);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-back{background:rgba(242,193,46,.08);border:1px solid rgba(242,193,46,.15);
  border-radius:8px;padding:7px 12px;color:var(--gold);font-size:.7rem;font-weight:900;cursor:pointer}
.chat-hd-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--text);flex:1}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(242,193,46,.1);border-radius:2px}
.msg-bbl{max-width:82%;border-radius:14px;padding:10px 13px;font-size:.79rem;line-height:1.6;color:var(--text)}
.msg-bbl.cliente{align-self:flex-start;background:rgba(10,28,17,.9);border:1px solid rgba(242,193,46,.1);border-bottom-left-radius:3px}
.msg-bbl.admin{align-self:flex-end;background:linear-gradient(135deg,rgba(242,193,46,.18),rgba(242,193,46,.09));border:1px solid rgba(242,193,46,.25);border-bottom-right-radius:3px}
.msg-bbl.pedido-bbl{align-self:flex-start;background:rgba(6,26,16,.9);border:1px solid rgba(242,193,46,.2);border-bottom-left-radius:3px;width:92%}
.msg-time{font-size:.52rem;color:var(--text3);margin-top:4px;text-align:right;font-family:'DM Mono',monospace}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);background:rgba(5,14,8,.7);display:flex;gap:8px;flex-shrink:0}
.chat-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(242,193,46,.14);
  border-radius:18px;padding:11px 14px;color:var(--text);font-size:.79rem;
  resize:none;line-height:1.5;transition:border-color .2s;max-height:80px}
.chat-inp:focus{border-color:rgba(242,193,46,.35)}
.chat-send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:.2s;align-self:flex-end}
.chat-send-btn:disabled{background:rgba(242,193,46,.12);cursor:default}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(11,38,25,.97);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:.77rem;font-weight:700;color:var(--text);
  z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CLIENTE DETAIL PANEL ── */
.detail-panel{position:fixed;inset:0;z-index:300;background:linear-gradient(170deg,#0b2016,#040d08);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto}
.detail-panel.open{transform:translateY(0)}
.detail-hd{padding:14px 16px;border-bottom:1px solid var(--border);
  background:rgba(5,14,8,.75);display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:10}
.detail-back{background:rgba(242,193,46,.08);border:1px solid rgba(242,193,46,.15);
  border-radius:8px;padding:7px 12px;color:var(--gold);font-size:.7rem;font-weight:900;cursor:pointer}
.detail-content{padding:16px}
.detail-avatar-big{width:64px;height:64px;border-radius:50%;background:rgba(242,193,46,.1);
  border:2px solid rgba(242,193,46,.3);display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold);
  margin:0 auto 12px}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;
  color:var(--text);text-align:center;line-height:1}
.detail-ci{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text2);
  letter-spacing:.2em;text-align:center;margin-top:4px}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.det-stat{background:rgba(242,193,46,.05);border:1px solid rgba(242,193,46,.1);
  border-radius:var(--radius-sm);padding:12px;text-align:center}
.det-stat-val{font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--gold)}
.det-stat-lbl{font-size:.5rem;color:var(--text2);letter-spacing:.1em;margin-top:3px}
.detail-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem}
.detail-row-lbl{color:var(--text2)}
.detail-row-val{color:var(--text);font-weight:700;text-align:right;max-width:60%}
.selo-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.selo-cell{display:flex;flex-direction:column;align-items:center;gap:2px;width:50px}
.selo-nome{font-size:.5rem;font-weight:700;letter-spacing:.03em;color:rgba(242,193,46,.75);text-align:center;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50px}
.selo-nome.vazio{color:rgba(255,255,255,.12)}
.pref-bar{display:flex;gap:6px;flex-wrap:wrap}
.pref-tag{font-size:.62rem;font-weight:600;color:var(--text);background:rgba(242,193,46,.1);border:1px solid rgba(242,193,46,.25);border-radius:20px;padding:4px 10px}
.pref-tag b{color:var(--gold);font-weight:800}
.selo-pip{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(242,193,46,.25);
  background:rgba(242,193,46,.05);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.selo-pip.done{background:rgba(242,193,46,.2);border-color:rgba(242,193,46,.5)}
.selo-pip.prize{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.4)}

@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes omi-blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
@keyframes omi-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</style>
</head>

async function carregarPedidos(silencioso=false){
  try{
    // Não-lidas = somente conversas com nao_lidas > 0 (zera quando admin abre o chat)
    try{
      const rc=await fetch(`${SUPA_URL}/rest/v1/omi_conversas?nao_lidas=gt.0&select=id`,{headers:H});
      const convs=await rc.json();
      conversasNaoLidas=new Set((convs||[]).map(c=>c.id));
      const navDotChat=document.getElementById('navDotChat');
      if(navDotChat) navDotChat.classList.toggle('show', conversasNaoLidas.size>0);
    }catch(e){}
    const r=await fetch(`${SUPA_URL}/rest/v1/omi_pedidos?select=*&order=criado_em.desc`,{headers:H});
    if(!r.ok)return;
    const novos=await r.json();
    const countNovos=novos.filter(p=>p.status==='novo').length;
    if(silencioso&&countNovos>ultimoCountNovos){tocarAlerta();showToast('🔔 Novo pedido!');}
    ultimoCountNovos=countNovos;
    pedidos=novos;
    renderPedidos();
  }catch(e){if(!silencioso)showToast('⚠ Sem conexão');}
}

async function atualizarStatus(id,novoStatus,whats,nome){
  try{
    await fetch(`${SUPA_URL}/rest/v1/omi_pedidos?id=eq.${id}`,{
      method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({status:novoStatus,atualizado_em:new Date().toISOString()})
    });
    const p=pedidos.find(x=>x.id===id);if(p)p.status=novoStatus;
    const msgs={em_preparo:`✅ Pedido aceito, ${nome}! Já vamos preparar. 🔥`,saiu:`🛵 Saiu para entrega, ${nome}! Já está a caminho.`};
    if(msgs[novoStatus]&&p?.conversa_id)await enviarMsgSistema(p.conversa_id,msgs[novoStatus]);
    showToast({em_preparo:'Pedido aceito ✓',saiu:'Saiu ✓'}[novoStatus]||'Atualizado');
    renderPedidos();
  }catch(e){showToast('Erro ao atualizar');}
}

async function recusarPedido(id,whats,nome){
  if(!confirm(`Recusar o pedido de ${nome}? O cliente será avisado e o pedido não será contabilizado.`))return;
  try{
    await fetch(`${SUPA_URL}/rest/v1/omi_pedidos?id=eq.${id}`,{
      method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({status:'recusado',atualizado_em:new Date().toISOString()})
    });
    const p=pedidos.find(x=>x.id===id);if(p)p.status='recusado';
    if(p?.conversa_id)await enviarMsgSistema(p.conversa_id,`Olá ${nome}, infelizmente não foi possível aceitar seu pedido neste momento. Pedimos desculpas pelo transtorno. 🙏`);
    showToast('Pedido recusado');
    renderPedidos();
  }catch(e){showToast('Erro ao recusar');}
}

// Cancela um pedido JÁ ACEITO (em preparo ou saiu) que não será entregue.
// Seguro: como a fidelidade só é contabilizada no ENTREGUE, nada precisa ser revertido.
async function cancelarPedido(id,whats,nome){
  const motivo=prompt(`Cancelar o pedido de ${nome}?\n\nIsso NÃO contabiliza na fidelidade (nada foi creditado ainda).\n\nMotivo (opcional, será enviado ao cliente):`);
  if(motivo===null)return; // clicou em cancelar o prompt
  try{
    await fetch(`${SUPA_URL}/rest/v1/omi_pedidos?id=eq.${id}`,{
      method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({status:'cancelado',atualizado_em:new Date().toISOString()})
    });
    const p=pedidos.find(x=>x.id===id);if(p)p.status='cancelado';
    if(p?.conversa_id){
      const extra=motivo.trim()?` Motivo: ${motivo.trim()}.`:'';
      await enviarMsgSistema(p.conversa_id,`Olá ${nome}, seu pedido precisou ser cancelado.${extra} Pedimos desculpas pelo transtorno e ficamos à disposição. 🙏`);
    }
    showToast('Pedido cancelado');
    renderPedidos();
  }catch(e){showToast('Erro ao cancelar');}
}

async function marcarEntregue(id,whats,nome,total){
  // Proteção contra duplo-clique: ignora se este pedido já está sendo processado
  window._processandoEntrega = window._processandoEntrega || new Set();
  if(window._processandoEntrega.has(id)) return;
  // Proteção extra: se o pedido já está entregue na memória, não reprocessa
  const _jaP=pedidos.find(x=>x.id===id);
  if(_jaP&&_jaP.status==='entregue') return;
  window._processandoEntrega.add(id);
  try{
    await fetch(`${SUPA_URL}/rest/v1/omi_pedidos?id=eq.${id}`,{
      method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({status:'entregue',atualizado_em:new Date().toISOString()})
    });
    const p=pedidos.find(x=>x.id===id);if(p)p.status='entregue';
    if(!whats){renderPedidos();window._processandoEntrega.delete(id);return;}
    const cr=await fetch(`${SUPA_URL}/rest/v1/clientes?whatsapp=eq.${encodeURIComponent(whats)}&select=*`,{headers:H});
    const lista=await cr.json();
    let cli;
    if(!lista.length){
      // Cliente não existe no Supabase — cria registro base
      const novoCliente={whatsapp:whats,nome:nome||'',total_pedidos:0,selos:'{}',
        cromi_acumulado:0,membro_coroa:false,premio_hamburguer:false,
        premio_combo:false,desconto_usado:true,fase:'jornada',
        ultimo_pedido:new Date().toISOString()};
      await fetch(`${SUPA_URL}/rest/v1/clientes`,{
        method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'},
        body:JSON.stringify(novoCliente)
      });
      cli=novoCliente;
    } else {
      cli=lista[0];
    }
    const novoTotal=(cli.total_pedidos||0)+1;
    // selos: trata string ou objeto (jsonb do Supabase)
    let selosAtual={};
    try{
      const rawS=cli.selos;
      selosAtual=typeof rawS==='string'?JSON.parse(rawS||'{}'):(rawS||{});
    }catch(e){selosAtual={};}

    // Selo = PRIMEIRO item selecionado no pedido (Sabores DOHN'MI)
    let tipoSelo='real';
    try{
      const raw=p.itens;
      const itArr=Array.isArray(raw)?raw:(typeof raw==='string'?JSON.parse(raw):(raw?Object.values(raw):[{}]));
      const hamburguers=['real','nobre','imperador','supremo','paraiso','alteza'];
      const COMBO_SELO={'combo-soberano':'soberano','combo-monarca':'monarca','combo-imperio':'imperio','combo-dame':'dameCombo'};
      // Primeiro item da sacola determina o selo
      const primItem=itArr[0];
      if(primItem){
        const id=(primItem.id||'').toLowerCase();
        if(hamburguers.includes(id))
          tipoSelo=id;
        else if(COMBO_SELO[id])
          tipoSelo=COMBO_SELO[id];
        else if(id==='batata150'||id==='batata300')
          tipoSelo='dameBatata';
        else if(id==='croc6'||id==='croc12')
          tipoSelo='dameFrango';
        else
          tipoSelo='real'; // fallback
      }
    }catch(e){console.warn('selo parse error',e);}
    // Sem selo cashcromi na jornada — selos são sempre Sabores DOHN'MI
    selosAtual[novoTotal]=tipoSelo;
    const selosCount=Object.keys(selosAtual).length;
    const membroCoroa=novoTotal>=12||cli.membro_coroa;

    // CROMI — regras exatas da Jornada e Membro
    // CROMI: pedidos 4 e 10 retirados — admin faz bump manual após pedido 3 e reset após 4/10
    const pedidosComCromi=[1,2,3,7,8,9];
    let novoCromi=cli.cromi_acumulado||0;
    let cashbackAplicado=0;
    let msgCashback='';
    let msgAtivacao='';

    if(membroCoroa){
      novoCromi=Math.round((novoCromi+1.70)*100)/100;
      if(novoCromi>=10.19&&novoCromi<11.89){
        novoCromi=11.90; // bump: pré-carrega para próximo pedido
        msgAtivacao='\n\n💰 Cashcromi R$11,90 ativo! Será aplicado no próximo pedido.';
      } else if(novoCromi>=11.89){
        cashbackAplicado=11.90;novoCromi=0;msgCashback='\n💰 Cashback R$11,90 liberado!';
      }
    } else if(pedidosComCromi.includes(novoTotal)){
      novoCromi=Math.round((novoCromi+1.49)*100)/100;
      if(novoTotal===3){
        novoCromi=5.96; // bump: pré-carrega pedido 4
        msgAtivacao='\n\n💰 Cashcromi R$5,96 ativo! Será aplicado no próximo pedido.';
      }
      if(novoTotal===9){
        msgAtivacao='\n\n💰 Cashcromi R$4,47 ativo! Será aplicado no próximo pedido.';
      }
    } else if(novoTotal===4){
      novoCromi=0; // cashback foi usado no pedido 4 — reseta
    } else if(novoTotal===10){
      novoCromi=0; // cashback foi usado no pedido 10 — reseta
    }

    // Prêmio ativado APÓS 6ª entrega → 7º pedido usa
    // Prêmio combo ativado APÓS 11ª entrega → 12º pedido usa
    const premHamb=novoTotal===5&&!cli.premio_hamburguer; // ativa após entrega 5, usa no pedido 6
    const premCombo=novoTotal===11&&!cli.premio_combo;

    await fetch(`${SUPA_URL}/rest/v1/clientes?whatsapp=eq.${encodeURIComponent(whats)}`,{
      method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({total_pedidos:novoTotal,selos:JSON.stringify(selosAtual),
        cromi_acumulado:parseFloat(novoCromi.toFixed(2)),membro_coroa:membroCoroa,
        premio_hamburguer:premHamb?true:(novoTotal>=6?false:(cli.premio_hamburguer||false)),
        premio_combo:premCombo?true:(novoTotal>=12?false:(cli.premio_combo||false)),
        ultimo_pedido:new Date().toISOString()})
    });

    const nome1=(nome||'').split(' ')[0]||'cidadão';
    const faltaProx=membroCoroa?Math.ceil((11.90-novoCromi)/1.70):
      novoTotal<7?(7-novoTotal):novoTotal<12?(12-novoTotal):0;
    const proximoMarco=membroCoroa?`Faltam ${Math.ceil((11.90-novoCromi)/1.70)} pedidos para cashback`:
      novoTotal<7?`Faltam ${7-novoTotal} pedidos para hambúrguer grátis`:
      novoTotal<12?`Faltam ${12-novoTotal} pedidos para Membro da Coroa`:'';

    let msg=`✅ Pedido confirmado!`;
    if(p?.conversa_id)await enviarMsgSistema(p.conversa_id,msg);
    const toastMsg=premHamb?'✓ 🎁 Hambúrguer grátis!':premCombo?'✓  Membro da Coroa!':
      premHamb?`🍔 Hambúrguer grátis desbloqueado para o ${novoTotal+1}º pedido!`:premCombo?`🎁 Combo grátis desbloqueado para o ${novoTotal+1}º pedido!`:cashbackAplicado>0?`✓ Cashback R$${cashbackAplicado.toFixed(2)} liberado!`:`✓ Selo ${novoTotal}/12 · CROMI atualizado`;
    showToast(toastMsg);
    renderPedidos();
    // Reload clientes para relatório
    await carregarClientes();
  }catch(e){console.error(e);showToast('Erro ao registrar entrega');}
  finally{ if(window._processandoEntrega) window._processandoEntrega.delete(id); }
}

async function enviarMsgSistema(convId,texto){
  try{
    await fetch(`${SUPA_URL}/rest/v1/omi_mensagens`,{
      method:'POST',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({conversa_id:convId,autor:'admin',tipo:'texto',conteudo:texto,criado_em:new Date().toISOString()})
    });
    await fetch(`${SUPA_URL}/rest/v1/omi_conversas?id=eq.${convId}`,{
      method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({ultima_msg:texto,atualizado_em:new Date().toISOString()})
    });

}

// ── CHAT ──
async function abrirChatWave(){
  try{
    // 1) tenta a conversa não lida mais recente
    let r=await fetch(`${SUPA_URL}/rest/v1/omi_conversas?nao_lidas=gt.0&order=atualizado_em.desc&limit=1`,{headers:H});
    let lista=await r.json();
    // 2) se não houver não lida, pega a conversa mais recente
    if(!lista||!lista.length){
      r=await fetch(`${SUPA_URL}/rest/v1/omi_conversas?order=atualizado_em.desc&limit=1`,{headers:H});
      lista=await r.json();
    }
    if(!lista||!lista.length){ showToast('Nenhuma conversa ainda.'); return; }
    const conv=lista[0];
    // tenta achar o nome do cliente pelo pedido vinculado
    let nome=conv.cliente_nome||'Cliente';
    if(!conv.cliente_nome){
      try{
        const rp=await fetch(`${SUPA_URL}/rest/v1/omi_pedidos?conversa_id=eq.${conv.id}&order=criado_em.desc&limit=1&select=cliente_nome`,{headers:H});
        const pp=await rp.json();
        if(pp&&pp[0]&&pp[0].cliente_nome) nome=pp[0].cliente_nome;
      }catch(e){}
    }
    abrirChat(conv.id,nome);
  }catch(e){ showToast('Erro ao abrir chat'); }
}

async function abrirChat(convId,nome){
  chatConvId=convId;
  document.getElementById('chatHdName').textContent=nome||'Cliente';
  document.getElementById('chatPanel').classList.add('open');
  // Zera não lidas ao abrir
  conversasNaoLidas.delete(convId);
  fetch(`${SUPA_URL}/rest/v1/omi_conversas?id=eq.${convId}`,{
    method:'PATCH',headers:{...H,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({nao_lidas:0})
  }).catch(()=>{});
  renderPedidos(); // Atualiza visual do botão
  await carregarMsgsChat();
  clearInterval(chatPoll);
  chatPoll=setInterval(()=>{if(chatConvId)carregarMsgsChat();},5000);
}
function fecharChat(){
  document.getElementById('chatPanel').classList.remove('open');
  chatConvId=null;clearInterval(chatPoll);
}
async function carregarMsgsChat(){
  if(!chatConvId)return;
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/omi_mensagens?conversa_id=eq.${chatConvId}&order=criado_em.asc`,{headers:H});
    chatMsgs=await r.json();renderMsgsChat();
  }catch(e){}
}
function renderMsgsChat(){
  const el=document.getElementById('chatMsgs');
  if(!chatMsgs.length){el.innerHTML='<div style="text-align:center;padding:40px;opacity:.3;font-size:.75rem">Sem mensagens</div>';return;}
  el.innerHTML=chatMsgs.map(m=>{
    const hora=m.criado_em?new Date(m.criado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    if(m.tipo==='pedido'){
      let d={};try{d=JSON.parse(m.conteudo||'{}')}catch(e){}
      return`<div class="msg-bbl pedido-bbl">
        <div style="font-size:.54rem;font-weight:900;letter-spacing:.1em;color:var(--gold);opacity:.7;margin-bottom:6px">PEDIDO</div>
        <div style="font-size:.75rem;line-height:1.6">${(d.itens||[]).map(i=>`• ${i.qty||1}× ${i.nome||i.id}`).join('<br>')}</div>
        <div style="font-family:'DM Mono',monospace;font-size:.78rem;color:var(--gold);margin-top:6px">R$ ${d.total||'—'}</div>
        <div class="msg-time">${hora}</div></div>`;
    }
    const cls=m.autor==='admin'?'admin':'cliente';
    return`<div class="msg-bbl ${cls}">${(m.conteudo||'').replace(/\n/g,'<br>')}<div class="msg-time">${hora}</div></div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}
async function enviarMsgChat(){
  const inp=document.getElementById('chatInp');
  const txt=(inp.value||'').trim();
  if(!txt||!chatConvId)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('chatSendBtn').disabled=true;

}

function abrirDetalhe(c){
  if(typeof c==='string')try{c=JSON.parse(c)}catch(e){return;}
  const ini=((c.nome||'?')[0]).toUpperCase();
  const selos=JSON.parse(c.selos||'{}');
  const selosCount=Object.keys(selos).length;
  const ci=c.codigo_imperial||'';
  const cromi=(c.cromi_acumulado||0).toFixed(2).replace('.',',');
  const faltaSelo=Math.max(0,7-selosCount);
  const faltaMembro=Math.max(0,12-(c.total_pedidos||0));
  // Nome curto de cada selo (= produto pedido) para identificar preferências
  const SELO_NOME={real:'REAL',nobre:'NOBRE',imperador:'IMPERADOR',supremo:'SUPREMO',paraiso:'PARAÍSO',alteza:'ALTEZA',soberano:'SOBERANO',monarca:'MONARCA',imperio:'IMPÉRIO',dameBatata:'BATATA',dameFrango:'FRANGO',dameCombo:'DAME',cashcromi:'CROMI'};
  const pips=Array.from({length:12},(_, i)=>{
    const n=i+1;
    const done=(c.total_pedidos||0)>=n;
    const is7=n===7,is12=n===12;
    const seloKey=selos[n]||selos[String(n)]||'';
    const nomeSelo=SELO_NOME[seloKey]||'';
    const topo=`<div class="selo-pip ${done?(is7||is12?'prize':'done'):''}">${is7?'🎁':is12?'👑':done?(n):n}</div>`;
    const label=done&&nomeSelo?`<div class="selo-nome">${nomeSelo}</div>`:`<div class="selo-nome vazio">—</div>`;
    return`<div class="selo-cell">${topo}${label}</div>`;
  }).join('');

  // Resumo de preferências: conta quantas vezes cada produto foi pedido
  const prefContagem={};
  Object.values(selos).forEach(s=>{const nm=SELO_NOME[s];if(nm&&s!=='cashcromi')prefContagem[nm]=(prefContagem[nm]||0)+1;});
  const prefOrdenado=Object.keys(prefContagem).sort((a,b)=>prefContagem[b]-prefContagem[a]);
  const prefHTML=prefOrdenado.length
    ? prefOrdenado.map(nm=>`<span class="pref-tag">${nm} <b>${prefContagem[nm]}×</b></span>`).join('')
    : '<span style="opacity:.4;font-size:.65rem">Sem pedidos ainda</span>';

  // ── INDICADORES DERIVADOS do histórico de pedidos deste cliente ──
  const meusPedidos=pedidos.filter(p=>p.cliente_whats===c.whatsapp&&p.status!=='cancelado');
  const dtP=p=>new Date(p.criado_em||p.atualizado_em||0).getTime();
  // Valor gasto total
  const gastoTotal=meusPedidos.reduce((s,p)=>s+(p.total||0),0);
  // Último pedido (dias atrás)
  let ultimoTxt='—', diasInativo=null;
  if(meusPedidos.length){
    const ultData=Math.max(...meusPedidos.map(dtP));
    diasInativo=Math.floor((Date.now()-ultData)/86400000);
    ultimoTxt=diasInativo===0?'hoje':diasInativo===1?'ontem':`há ${diasInativo} dias`;
  }
  // Frequência média (dias entre pedidos)
  let freqTxt='—';
  if(meusPedidos.length>=2){
    const datas=meusPedidos.map(dtP).sort((a,b)=>a-b);
    const intervalo=(datas[datas.length-1]-datas[0])/86400000/(datas.length-1);
    freqTxt=`1 pedido a cada ${Math.round(intervalo)||1} dia${Math.round(intervalo)>1?'s':''}`;
  }
  // Horário favorito
  const horasC={};
  meusPedidos.forEach(p=>{const h=new Date(dtP(p)).getHours();horasC[h]=(horasC[h]||0)+1;});
  const hFav=Object.keys(horasC).sort((a,b)=>horasC[b]-horasC[a])[0];
  const horarioTxt=hFav!=null?`${String(hFav).padStart(2,'0')}h às ${String((+hFav+1)%24).padStart(2,'0')}h`:'—';
  // Pagamento favorito
  const pagC={};
  meusPedidos.forEach(p=>{const f=p.forma_pagamento;if(f)pagC[f]=(pagC[f]||0)+1;});
  const pagFav=Object.keys(pagC).sort((a,b)=>pagC[b]-pagC[a])[0];
  const pagTxt=pagFav?`${pagFav} ${Math.round((pagC[pagFav]/meusPedidos.length)*100)}%`:'—';
  // Nível (por total de pedidos)
  const tp=c.total_pedidos||0;
  const nivel=c.membro_coroa?'Soberano':tp>=10?'Monarca':tp>=6?'Ouro':tp>=3?'Prata':'Bronze';
  const nivelCor=c.membro_coroa?'#f2c12e':tp>=10?'#e0b3ff':tp>=6?'#ffd700':tp>=3?'#c0c0c0':'#cd7f32';
  // Status de risco
  let risco='🟢 Ativo', riscoCor='#4ade80';
  if(diasInativo!=null){
    if(diasInativo>30){risco='🔴 Inativo';riscoCor='#f87171';}
    else if(diasInativo>14){risco='🟡 Atenção';riscoCor='#fbbf24';}
  } else { risco='⚪ Novo'; riscoCor='rgba(255,255,255,.4)'; }
  const fmtR=v=>'R$ '+(v||0).toFixed(2).replace('.',',');

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-avatar-big">${ini}</div>
    <div class="detail-name">${c.nome||'—'}</div>
    ${ci?`<div class="detail-ci">CI · ${ci.slice(0,4)} ${ci.slice(4)}</div>`:''}
    <div class="detail-stats">
      <div class="det-stat"><div class="det-stat-val">${c.total_pedidos||0}</div><div class="det-stat-lbl">Pedidos</div></div>
      <div class="det-stat"><div class="det-stat-val">${selosCount}/7</div><div class="det-stat-lbl">Selos</div></div>
      <div class="det-stat"><div class="det-stat-val">R$ ${cromi}</div><div class="det-stat-lbl">CROMI</div></div>
    </div>
    <div class="detail-row"><span class="detail-row-lbl">WhatsApp</span><span class="detail-row-val">${c.whatsapp||'—'}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Aniversário</span><span class="detail-row-val">${c.aniversario||'—'}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Endereço</span><span class="detail-row-val">${c.endereco||'—'}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Status</span><span class="detail-row-val">${c.membro_coroa?' Membro da Coroa':'Cidadão'}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Nível</span><span class="detail-row-val" style="color:${nivelCor}">${nivel}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Situação</span><span class="detail-row-val" style="color:${riscoCor}">${risco}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Valor gasto</span><span class="detail-row-val">${fmtR(gastoTotal)}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Último pedido</span><span class="detail-row-val">${ultimoTxt}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Frequência</span><span class="detail-row-val">${freqTxt}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Horário favorito</span><span class="detail-row-val">${horarioTxt}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Pagamento favorito</span><span class="detail-row-val">${pagTxt}</span></div>
    <div class="detail-row"><span class="detail-row-lbl">Desconto ativo</span><span class="detail-row-val">${(c.descontoAtivo&&!c.desconto_usado)?'✓ -10% disponível':'—'}</span></div>
    <div class="section-title" style="margin-top:16px;margin-bottom:8px">Jornada da Coroa</div>
    <div class="selo-bar">${pips}</div>
    <div style="font-size:.65rem;color:var(--text2);margin-top:8px">
      ${faltaSelo>0?`Falta${faltaSelo>1?'m':''} ${faltaSelo} selo${faltaSelo>1?'s':''} para hambúrguer grátis`:'🎁 Hambúrguer grátis desbloqueado!'}
      ${!c.membro_coroa&&faltaMembro>0?` · ${faltaMembro} pedido${faltaMembro>1?'s':''} para Membro da Coroa`:''}
    </div>
    <div class="section-title" style="margin-top:16px;margin-bottom:8px">Preferências do Cidadão</div>
    <div class="pref-bar">${prefHTML}</div>`;
  document.getElementById('detailPanel').classList.add('open');
}

//  RELATÓRIOS
// ══════════════════════════════════════
function renderRelatorios(){
  // ── Mapeamento de nomes de produto (selo → nome) ──
  const SELO_NOME={real:'REAL',nobre:'NOBRE',imperador:'IMPERADOR',supremo:'SUPREMO',paraiso:'PARAÍSO',alteza:'ALTEZA',soberano:'SOBERANO',monarca:'MONARCA',imperio:'IMPÉRIO',dameBatata:'BATATA',dameFrango:'FRANGO',dameCombo:'DAME'};

  // ── Helpers de data ──
  const agora=new Date();
  const inicioHoje=new Date(agora.getFullYear(),agora.getMonth(),agora.getDate()).getTime();
  const inicioSemana=inicioHoje-6*86400000;
  const inicioMes=new Date(agora.getFullYear(),agora.getMonth(),1).getTime();

  // Considera só pedidos válidos (entregues ou em andamento, não cancelados)
  const validos=pedidos.filter(p=>p.status!=='cancelado');
  const dt=p=>new Date(p.criado_em||p.atualizado_em||0).getTime();

  // ── FATURAMENTO por período ──
  const fatHoje=validos.filter(p=>dt(p)>=inicioHoje).reduce((s,p)=>s+(p.total||0),0);
  const fatSemana=validos.filter(p=>dt(p)>=inicioSemana).reduce((s,p)=>s+(p.total||0),0);
  const fatMes=validos.filter(p=>dt(p)>=inicioMes).reduce((s,p)=>s+(p.total||0),0);
  const fatTotal=validos.reduce((s,p)=>s+(p.total||0),0);

  // ── TICKET MÉDIO ──
  const ticket=validos.length?fatTotal/validos.length:0;

  // ── PRODUTOS MAIS VENDIDOS (dos itens dos pedidos) ──
  const prodCount={};
  validos.forEach(p=>{
    let its=[];try{its=typeof p.itens==='string'?JSON.parse(p.itens):(p.itens||[]);}catch(e){}
    (its||[]).forEach(i=>{const nm=i.nome||i.id;if(nm)prodCount[nm]=(prodCount[nm]||0)+(i.qty||1);});
  });
  const topProdutos=Object.keys(prodCount).sort((a,b)=>prodCount[b]-prodCount[a]).slice(0,5);

  // ── HORÁRIO DE PICO ──
  const horas={};
  validos.forEach(p=>{const h=new Date(dt(p)).getHours();horas[h]=(horas[h]||0)+1;});
  const horaPico=Object.keys(horas).sort((a,b)=>horas[b]-horas[a])[0];
  const picoTxt=horaPico!=null?`${String(horaPico).padStart(2,'0')}h às ${String((+horaPico+1)%24).padStart(2,'0')}h`:'—';

  // ── PAGAMENTO favorito ──
  const pagas={};
  validos.forEach(p=>{const f=p.forma_pagamento||'—';pagas[f]=(pagas[f]||0)+1;});
  const pagTop=Object.keys(pagas).sort((a,b)=>pagas[b]-pagas[a])[0]||'—';
  const pagPct=validos.length?Math.round((pagas[pagTop]||0)/validos.length*100):0;

  // ── CLIENTES novos (este mês) e recorrentes ──
  const novosMes=clientes.filter(c=>{
    const cd=new Date(c.criado_em||0).getTime();
    return cd>=inicioMes;
  }).length;
  const recorrentes=clientes.filter(c=>(c.total_pedidos||0)>=2).length;
  const pctRecorrente=clientes.length?Math.round(recorrentes/clientes.length*100):0;

  // ── CASHBACK emitido vs utilizado ──
  const cashEmitido=clientes.reduce((s,c)=>s+(c.cromi_acumulado||0),0);
  const cashUsado=validos.reduce((s,p)=>s+(p.desconto||0),0);

  const membros=clientes.filter(c=>c.membro_coroa).length;
  const fmt=v=>'R$ '+(v||0).toFixed(2).replace('.',',');

  // ── Render dos cards principais ──
  const grid=document.getElementById('relGrid');
  grid.innerHTML=`
    <div class="rel-card"><div class="rel-val">${fmt(fatHoje)}</div><div class="rel-lbl">Faturamento Hoje</div></div>
    <div class="rel-card"><div class="rel-val">${fmt(fatSemana)}</div><div class="rel-lbl">Últimos 7 dias</div></div>
    <div class="rel-card"><div class="rel-val">${fmt(fatMes)}</div><div class="rel-lbl">Este mês</div></div>
    <div class="rel-card"><div class="rel-val">${fmt(ticket)}</div><div class="rel-lbl">Ticket Médio</div></div>
    <div class="rel-card"><div class="rel-val">${validos.length}</div><div class="rel-lbl">Total Pedidos</div></div>
    <div class="rel-card"><div class="rel-val">${clientes.length}</div><div class="rel-lbl">Cidadãos</div></div>
    <div class="rel-card"><div class="rel-val">${novosMes}</div><div class="rel-lbl">Novos este mês</div></div>
    <div class="rel-card"><div class="rel-val">${pctRecorrente}%</div><div class="rel-lbl">Recorrentes</div></div>
    <div class="rel-card"><div class="rel-val">${picoTxt}</div><div class="rel-lbl">Horário de Pico</div></div>
    <div class="rel-card"><div class="rel-val">${pagTop} ${pagPct}%</div><div class="rel-lbl">Pagamento Favorito</div></div>
    <div class="rel-card"><div class="rel-val">${membros}</div><div class="rel-lbl">Membros Coroa</div></div>
    <div class="rel-card"><div class="rel-val">${fmt(cashEmitido)}</div><div class="rel-lbl">CROMI Acumulado</div></div>
    <div class="rel-card wide"><div class="rel-val">${fmt(cashUsado)}</div><div class="rel-lbl">Cashback/Desconto Utilizado</div></div>`;

  // ── Produtos mais vendidos ──
  const elProd=document.getElementById('topProdutos');
  if(elProd) elProd.innerHTML=topProdutos.length
    ?topProdutos.map((nm,i)=>`<div class="top-item">
        <div class="top-rank">${i+1}º</div>
        <div class="top-info"><div class="top-nome">${nm}</div></div>
        <div class="top-val">${prodCount[nm]} un</div></div>`).join('')
    :'<div style="opacity:.3;font-size:.72rem;padding:16px 0">Sem vendas ainda</div>';

  // ── Top clientes (por valor gasto) ──
  const gastoPorCliente={};
  validos.forEach(p=>{const w=p.cliente_whats;if(w)gastoPorCliente[w]=(gastoPorCliente[w]||0)+(p.total||0);});
  const top=[...clientes].map(c=>({...c,gasto:gastoPorCliente[c.whatsapp]||0}))
    .sort((a,b)=>b.gasto-a.gasto).slice(0,5);
  document.getElementById('topClientes').innerHTML=top.length&&top[0].gasto>0
    ?top.map((c,i)=>`<div class="top-item">
        <div class="top-rank">#${i+1}</div>
        <div class="top-info"><div class="top-nome">${c.nome||'—'}</div><div class="top-sub">${c.total_pedidos||0} pedidos</div></div>
        <div class="top-val">${fmt(c.gasto)}</div></div>`).join('')
    :'<div style="opacity:.3;font-size:.72rem;padding:16px 0">Sem dados ainda</div>';

  // ── Próximos prêmios ──
  const proxPremio=[...clientes]
    .filter(c=>!c.membro_coroa)
    .map(c=>({...c,nselos:Object.keys(JSON.parse(c.selos||'{}')).length}))
    .filter(c=>c.nselos>=5&&c.nselos<7)
    .sort((a,b)=>b.nselos-a.nselos)
    .slice(0,5);
  document.getElementById('proximosPremios').innerHTML=proxPremio.length
    ?proxPremio.map(c=>`<div class="top-item">
        <div class="top-rank">🎁</div>
        <div class="top-info"><div class="top-nome">${c.nome||'—'}</div><div class="top-sub">Falta${7-c.nselos>1?'m':''} ${7-c.nselos} selo${7-c.nselos>1?'s':''}</div></div>
        <div class="top-val">${c.nselos}/7</div></div>`).join('')
    :'<div style="opacity:.3;font-size:.72rem;padding:16px 0">Nenhum próximo do prêmio</div>';
}

// ══════════════════════════════════════
//  O-MI IA
// ══════════════════════════════════════
function buildOMIContext(){
  const totalPedidos=pedidos.length;
  const novos=pedidos.filter(p=>p.status==='novo').length;
  const receita=pedidos.reduce((s,p)=>s+(p.total||0),0);
  const membros=clientes.filter(c=>c.membro_coroa).length;
  const cromi=clientes.reduce((s,c)=>s+(c.cromi_acumulado||0),0);
  return`CONTEXTO ADMIN DOHN'MI:
- Total de pedidos registrados: ${totalPedidos}
- Pedidos novos aguardando: ${novos}
- Receita total registrada: R$ ${receita.toFixed(2)}
- Total de clientes: ${clientes.length}
- Membros da Coroa: ${membros}
- CROMI emitido: R$ ${cromi.toFixed(2)}
- Hora atual: ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
}

const OMI_SUGGS=['Resumo do dia','Quantos membros da Coroa temos?','Quem está próximo do prêmio?','Qual a receita total?'];

function initOMIPage(){
  if(omiMsgs.length)return;
  omiMsgs=[{role:'assistant',content:'Olá! Sou O-Mi, seu assistente DOHN\'MI. Tenho acesso aos dados do Império. Como posso ajudar?',expr:'feliz'}];
  renderOMI();
}

function renderOMI(){
  const el=document.getElementById('omiMsgs');
  let html=omiMsgs.map(m=>{
    if(m.role==='assistant')
      return`<div class="omi-bubble omi"><div class="omi-bubble-av"><svg width="18" height="18" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="17" r="9" fill="none" stroke="#F2C12E" stroke-width="1.5"/><circle cx="16.5" cy="15.5" r="1.8" fill="#F2C12E"/><circle cx="23.5" cy="15.5" r="1.8" fill="#F2C12E"/><path d="M16.5 19.5 Q20 22 23.5 19.5" stroke="#F2C12E" stroke-width="1.3" stroke-linecap="round" fill="none"/><circle cx="20" cy="8" r="1.5" fill="#F2C12E"/></svg></div><div class="omi-bubble-txt">${m.content.replace(/\n/g,'<br>')}</div></div>`;
    return`<div class="omi-bubble user">${m.content.replace(/\n/g,'<br>')}</div>`;
  }).join('');
  if(omiLoading)html+=`<div class="omi-typing"><div class="omi-dots"><span></span><span></span><span></span></div></div>`;
  if(omiMsgs.length===1&&!omiLoading)html+=`<div class="omi-sugg">${OMI_SUGGS.map(s=>`<button class="omi-sugg-btn" onclick="omiSend('${s}')">${s}</button>`).join('')}</div>`;
  el.innerHTML=html;el.scrollTop=el.scrollHeight;
}

async function omiSend(texto=null){
  const inp=document.getElementById('omiInput');
  const msg=(texto||inp.value||'').trim();
  if(!msg||omiLoading)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('omiSendBtn').disabled=true;
  omiMsgs.push({role:'user',content:msg});
  omiLoading=true;renderOMI();
  try{
    const system=`Você é O-Mi Wave, assistente inteligente do Império DOHN'MI. Papel: guardião dos dados e operações do negócio.

PERSONALIDADE: Direto, preciso, orgulhoso da marca. Máximo 3-4 linhas por resposta.
LINGUAGEM: clientes=cidadãos · pedidos=decretos · marca=Império

SISTEMA DE FIDELIDADE (para calcular corretamente):
- Jornada: CROMI +R$1,49 nos pedidos 1, 2, 3, 7, 8, 9
- Cashback automático: R$5,96 no 4º pedido · R$4,47 no 10º pedido
- Após 5ª entrega: hambúrguer grátis (6º pedido) · após 11ª entrega: combo grátis (12º pedido) → Membro da Coroa
- Membro da Coroa: CROMI +R$1,70/pedido · cashback R$11,90 ao atingir máximo · entrega grátis

${buildOMIContext()}`;
    const r=await fetch(CLAUDE_API,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY},
      body:JSON.stringify({max_tokens:600,system,
        messages:omiMsgs.map(m=>({role:m.role,content:m.content}))})
    });
    const data=await r.json();
    const reply=data.content?.[0]?.text||'...';
    omiMsgs.push({role:'assistant',content:reply});
  }catch(e){omiMsgs.push({role:'assistant',content:'Houve uma falha na conexão. Tente novamente.'});}
  omiLoading=false;renderOMI();
}

// ── POLLING ──
function startPolling(){
  carregarPedidos();carregarClientes();
  setInterval(()=>{carregarPedidos(true);},5000);
  setInterval(()=>{carregarClientes();},30000);
}
startPolling();
</script>
