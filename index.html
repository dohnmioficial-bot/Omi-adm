<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOHN'MI · Cardápio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050e08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DOHN'MI">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
 --gold:#F2C12E;--gold2:#C99D1F;--green:#06261D;--dark:#050e08;
 --text:#e8dfc8;--text2:rgba(232,223,200,.55);--text3:rgba(232,223,200,.28);
 --border:rgba(242,193,46,.12);--border2:rgba(242,193,46,.22);
 --card-bg:rgba(11,38,25,.7);--radius:16px;--radius-sm:10px;--radius-xs:7px;
 --shadow:0 8px 32px rgba(0,0,0,.5);
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;padding-bottom:110px;overflow-x:hidden}
button,input{font-family:'Nunito',sans-serif;cursor:pointer}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(242,193,46,.07) 0%,transparent 60%)}

/* HERO */
.hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:22px 20px 6px}
.hero img.logo{display:block;width:min(270px,74vw);height:auto;filter:drop-shadow(0 0 24px rgba(242,193,46,.45))}
.hero-bar{display:flex;align-items:center;gap:8px;margin:8px auto 0;background:rgba(242,193,46,.05);border:1px solid var(--border);border-radius:30px;padding:6px 16px;font-size:.65rem;font-weight:700;color:rgba(242,193,46,.55);letter-spacing:.08em}
.hero-bar-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.4}
.divider{position:relative;z-index:1;max-width:520px;margin:10px auto;display:flex;align-items:center;gap:14px;padding:0 16px}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(242,193,46,.2),transparent)}
.div-ornament{color:rgba(242,193,46,.35);font-size:.55rem;letter-spacing:.2em}

/* FIDELIDADE */
.fidelidade-wrap{position:relative;z-index:1;max-width:480px;margin:0 auto 4px;padding:0 16px}
.papiro{background:linear-gradient(145deg,rgba(18,14,5,.95),rgba(11,31,18,.95));border-radius:var(--radius);border:1px solid var(--border2);box-shadow:var(--shadow),inset 0 1px 0 rgba(242,193,46,.08);overflow:hidden;position:relative}
.papiro::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(242,193,46,.3),transparent)}
.pap-top{padding:12px 16px;text-align:center;border-bottom:1px solid rgba(242,193,46,.08);font-size:.65rem;font-weight:900;letter-spacing:.18em;color:rgba(242,193,46,.7);background:rgba(242,193,46,.03)}
.card-cupom{padding:18px}
.cupom-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.25rem;color:var(--gold);margin-bottom:4px}
.cupom-sub{font-size:.75rem;color:var(--text2);margin-bottom:16px;line-height:1.6}
.inp-group{margin-bottom:12px}
.inp-group label{display:block;font-size:.6rem;font-weight:800;color:rgba(242,193,46,.5);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.inp-group input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(242,193,46,.15);border-radius:var(--radius-xs);padding:10px 14px;color:var(--text);font-size:.85rem;outline:none;transition:all .2s}
.inp-group input:focus{border-color:rgba(242,193,46,.4);background:rgba(242,193,46,.04)}
.inp-btn{display:block;width:100%;background:linear-gradient(135deg,var(--gold),#c99d1f);color:var(--green);font-weight:900;font-size:.88rem;padding:12px;border:none;border-radius:var(--radius-xs);letter-spacing:.06em;transition:all .2s;box-shadow:0 4px 14px rgba(242,193,46,.25);margin-top:6px;cursor:pointer}
.inp-btn:hover{opacity:.9;transform:translateY(-1px)}
.card-ativo{padding:12px}
.ca-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ca-nome{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.1rem;color:var(--gold)}
.ca-badge{font-size:.55rem;font-weight:800;letter-spacing:.1em;background:rgba(242,193,46,.1);border:1px solid rgba(242,193,46,.2);border-radius:20px;padding:3px 9px;color:rgba(242,193,46,.7)}
.desconto-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:20px;padding:3px 10px;font-size:.6rem;font-weight:800;color:#4ade80;margin-bottom:10px}
.cromi-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(242,193,46,.06);border:1px solid rgba(242,193,46,.12);border-radius:var(--radius-xs);padding:8px 12px;margin-bottom:12px;font-size:.62rem;font-weight:700;color:rgba(242,193,46,.65)}
.cromi-bar img{width:18px;height:18px;border-radius:50%;margin-right:5px;vertical-align:middle}
.marcos{display:flex;flex-direction:column;gap:6px}
.marco-card{border-radius:var(--radius-sm);padding:9px 12px;border:1px solid;display:flex;align-items:center;gap:10px}
.marco-card.cashback-card{background:rgba(255,140,0,.06);border-color:rgba(255,140,0,.18)}
.marco-card.prize-card{background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.18)}
.marco-card.vip-card{background:rgba(139,92,246,.06);border-color:rgba(139,92,246,.18)}
.marco-icon{font-size:1rem;flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.marco-icon.mi-moto,.marco-icon.mi-cake,.marco-icon.mi-scroll{
  background:var(--sprite) no-repeat center/contain;
  background-size:400% 200%;
}
.marco-icon.mi-moto{background-position:100% 0%}
.marco-icon.mi-cake{background-position:0% 0%}
.marco-icon.mi-scroll{background-position:66.67% 100%}

.marco-info{flex:1;min-width:0}
.marco-titulo{font-size:.66rem;font-weight:800;color:rgba(255,255,255,.85)}
.marco-desc{font-size:.56rem;color:var(--text3);margin-top:1px}
.marco-status{font-size:.54rem;font-weight:900;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.cashback-card .marco-status{background:rgba(255,140,0,.18);color:#ffb347}
.prize-card .marco-status{background:rgba(74,222,128,.18);color:#4ade80}
.vip-card .marco-status{background:rgba(139,92,246,.18);color:#a78bfa}
.card-vip{padding:20px 16px;text-align:center}
.vip-nome{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.3rem;color:var(--gold);margin-bottom:14px}
.cromi-track{background:rgba(242,193,46,.05);border:1px solid rgba(242,193,46,.12);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px}
.cromi-track-label{font-size:.58rem;font-weight:900;letter-spacing:.12em;color:rgba(242,193,46,.45);text-transform:uppercase;margin-bottom:10px}
.cromi-pips{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.cromi-pip{width:32px;height:32px;border-radius:50%;opacity:.2;transition:.3s;overflow:hidden}
.cromi-pip img{width:100%;height:100%;object-fit:cover}
.cromi-pip.on{opacity:1;box-shadow:0 0 10px rgba(242,193,46,.4)}
.cromi-track-desc{font-size:.6rem;color:var(--text3);line-height:1.5}

/* MENU */
.menu-wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 14px}
.menu-intro{position:relative;z-index:1;max-width:1000px;margin:8px auto 0;padding:0 14px}
.menu-tagline{display:flex;align-items:center;gap:10px;padding:12px 0 6px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,3vw,1.05rem);color:rgba(242,193,46,.4)}
.menu-tagline::before,.menu-tagline::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(242,193,46,.12),transparent)}
.sh{display:flex;align-items:center;gap:12px;margin:26px 0 12px}
.sh-icon{width:32px;height:32px;border-radius:var(--radius-xs);background:linear-gradient(135deg,rgba(242,193,46,.25),rgba(242,193,46,.1));border:1px solid rgba(242,193,46,.2);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.sh-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.2rem;color:var(--gold)}
.sh-extra{font-size:.6rem;color:var(--text3);margin-left:auto;font-style:italic}
.bgrid,.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.row2,.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bc,.rc,.mc,.cc{background:var(--card-bg);border-radius:var(--radius-sm);padding:15px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.05);user-select:none;position:relative;overflow:hidden}
.bc:hover,.rc:hover,.mc:hover,.cc:hover{border-color:rgba(242,193,46,.18);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.bc.selected,.rc.selected,.mc.selected,.cc.selected{border-color:rgba(242,193,46,.4);background:rgba(6,38,29,.85)}
.bc-check{float:right;width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(242,193,46,.25);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:transparent;transition:.2s}
.bc.selected .bc-check{background:var(--gold);color:var(--green);border-color:var(--gold)}
.bc-name{font-weight:900;font-size:.9rem;color:var(--gold);margin-bottom:5px;letter-spacing:.04em}
.bc-desc{font-size:.67rem;color:rgba(232,223,200,.72);margin:4px 0 10px;line-height:1.5}
.bc-prices{display:flex;gap:10px;align-items:baseline}
.bc-p.simples{font-size:.78rem;font-weight:700;color:var(--text2);font-family:'DM Mono',monospace}
.bc-p.duplo{font-size:.78rem;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace}
.tipo-sel{display:none;gap:6px;margin-top:10px}
.bc.selected .tipo-sel{display:flex}
.tipo-btn{flex:1;padding:6px;border-radius:var(--radius-xs);background:transparent;border:1px solid rgba(242,193,46,.15);color:var(--text2);font-size:.65rem;font-weight:800;transition:.15s;cursor:pointer}
.tipo-btn.active{background:var(--gold);color:var(--green);border-color:var(--gold)}
.rc-name{font-weight:900;font-size:.88rem;color:var(--text)}
.rc-price{font-weight:700;font-size:1.15rem;color:var(--gold);margin:5px 0 2px;font-family:'DM Mono',monospace}
.rc-desc{font-size:.62rem;color:rgba(232,223,200,.55);line-height:1.4}
.cc-badge{font-size:.55rem;font-weight:900;letter-spacing:.1em;color:rgba(242,193,46,.4);margin-bottom:4px}
.cc-name{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.1rem;color:var(--gold)}
.cc-desc{font-size:.62rem;color:rgba(232,223,200,.7);margin:5px 0 8px;line-height:1.45}
.cc-price{font-weight:700;font-size:1.6rem;color:var(--gold);font-family:'DM Mono',monospace}
.qty-ctrl{display:none;align-items:center;gap:10px;margin-top:10px;justify-content:flex-end}
.bc.selected .qty-ctrl,.rc.selected .qty-ctrl,.mc.selected .qty-ctrl,.cc.selected .qty-ctrl{display:flex}
.qty-btn{width:28px;height:28px;border-radius:50%;background:rgba(242,193,46,.08);border:1px solid rgba(242,193,46,.2);color:var(--gold);font-size:.85rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.15s;cursor:pointer}
.qty-btn:hover{background:var(--gold);color:var(--green)}
.qty-num{font-weight:900;font-size:.9rem;color:var(--gold);min-width:18px;text-align:center;font-family:'DM Mono',monospace}

/* SACOLA */
.bag-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 14px 20px;background:linear-gradient(to top,rgba(5,14,8,.98) 60%,transparent)}
.bag-btn{display:flex;width:100%;max-width:500px;margin:0 auto;background:#25D366;padding:14px 22px;border-radius:40px;align-items:center;justify-content:space-between;color:#fff;font-weight:900;font-size:.95rem;border:none;transition:all .2s;box-shadow:0 4px 20px rgba(37,211,102,.3);cursor:pointer}
.bag-btn.empty{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);justify-content:center;gap:8px;box-shadow:none}
.bag-btn:not(.empty):hover{opacity:.92;transform:translateY(-1px)}

/* DRAWER */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.drawer-ov.hidden{display:none}
.drawer{background:linear-gradient(180deg,#0d1f14,#081410);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:0 0 24px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
.drawer-handle{display:flex;justify-content:center;padding:12px;position:sticky;top:0;background:rgba(13,31,20,.95);border-bottom:1px solid rgba(242,193,46,.06);backdrop-filter:blur(8px);z-index:10;border-radius:22px 22px 0 0}
.drawer-handle-bar{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:4px}
.drawer-inner{padding:0 16px}
.omi-float{position:relative;overflow:hidden;background:linear-gradient(160deg,#06180f,#040d08);border-bottom:1px solid rgba(242,193,46,.1);padding:12px 12px 0;display:flex;align-items:flex-end;min-height:90px}
.omi-float::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 90% 110% at 18% 105%,rgba(242,193,46,.08) 0%,transparent 60%)}
.omi-char{flex-shrink:0;width:80px;height:80px;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(242,193,46,.3));animation:omiFloat 3s ease-in-out infinite;z-index:2}

/* O-MI CHAT BUTTON */
.omi-chat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:10px 0 0;background:rgba(242,193,46,.07);border:1px solid rgba(242,193,46,.2);border-radius:var(--radius-sm);padding:11px;color:var(--gold);font-size:.75rem;font-weight:900;letter-spacing:.08em;cursor:pointer;transition:.2s}
.omi-chat-btn:hover{background:rgba(242,193,46,.13);border-color:rgba(242,193,46,.35)}

/* O-MI CHAT MODAL */
.omi-chat-modal{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;background:linear-gradient(170deg,#0b2016,#040d08);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
.omi-chat-modal.open{transform:translateY(0)}
.omi-cm-header{padding:14px 16px 12px;border-bottom:1px solid rgba(242,193,46,.08);background:rgba(5,14,8,.7);display:flex;align-items:center;gap:12px;flex-shrink:0}
.omi-cm-back{background:rgba(242,193,46,.08);border:1px solid rgba(242,193,46,.15);border-radius:8px;padding:7px 12px;color:var(--gold);font-size:.7rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0}
.omi-cm-avatar{width:38px;height:38px;border-radius:50%;background:rgba(242,193,46,.1);border:1.5px solid rgba(242,193,46,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.omi-cm-avatar img{width:100%;height:100%;object-fit:contain}
.omi-cm-info{flex:1}
.omi-cm-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--gold);line-height:1}
.omi-cm-sub{font-size:.55rem;color:var(--text2);letter-spacing:.12em;font-family:'DM Mono',monospace;margin-top:2px}
.omi-cm-msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
.omi-cm-msgs::-webkit-scrollbar{width:3px}
.omi-cm-msgs::-webkit-scrollbar-thumb{background:rgba(242,193,46,.12);border-radius:2px}
.omi-cm-bubble{max-width:80%;border-radius:14px;padding:10px 13px;font-size:.79rem;line-height:1.6;color:var(--text);animation:fadeUp .25s ease}
.omi-cm-bubble.omi{align-self:flex-start;background:rgba(10,28,17,.9);border:1px solid rgba(242,193,46,.1);border-bottom-left-radius:3px;display:flex;gap:8px;align-items:flex-start}
.omi-cm-bubble.omi .omi-bubble-avatar{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1px solid rgba(242,193,46,.25);overflow:hidden;background:rgba(242,193,46,.08)}
.omi-cm-bubble.omi .omi-bubble-avatar img{width:100%;height:100%;object-fit:contain}
.omi-cm-bubble.omi .omi-bubble-text{flex:1}
.omi-cm-bubble.user{align-self:flex-end;background:linear-gradient(135deg,rgba(242,193,46,.18),rgba(242,193,46,.09));border:1px solid rgba(242,193,46,.27);border-bottom-right-radius:3px}
.omi-cm-typing{align-self:flex-start;background:rgba(10,28,17,.9);border:1px solid rgba(242,193,46,.1);border-radius:14px 14px 14px 3px;padding:10px 16px}
.omi-typing-dots{display:flex;gap:5px;align-items:center}
.omi-typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:omiFloat 1.2s ease-in-out infinite}
.omi-typing-dots span:nth-child(2){animation-delay:.2s}
.omi-typing-dots span:nth-child(3){animation-delay:.4s}
.omi-cm-input-area{padding:10px 12px;border-top:1px solid rgba(242,193,46,.08);background:rgba(5,14,8,.7);display:flex;gap:8px;flex-shrink:0}
.omi-cm-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(242,193,46,.14);border-radius:18px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.79rem;outline:none;resize:none;line-height:1.5;transition:border-color .2s;max-height:80px}
.omi-cm-input:focus{border-color:rgba(242,193,46,.35)}
.omi-cm-send{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;align-self:flex-end}
.omi-cm-send:disabled{background:rgba(242,193,46,.12);cursor:default}
.omi-cm-send:not(:disabled):hover{transform:scale(1.06)}

/* CÓDIGO IMPERIAL */
.ci-wrap{background:linear-gradient(135deg,rgba(242,193,46,.12),rgba(242,193,46,.06));border:1.5px solid rgba(242,193,46,.35);border-radius:var(--radius-sm);padding:16px;text-align:center;margin:14px 0}
.ci-label{font-size:.55rem;font-weight:900;letter-spacing:.18em;color:rgba(242,193,46,.6);font-family:'DM Mono',monospace;margin-bottom:8px}
.ci-code{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:500;color:var(--gold);letter-spacing:.25em;margin-bottom:8px}
.ci-desc{font-size:.62rem;color:var(--text2);line-height:1.5}
.ci-copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:rgba(242,193,46,.1);border:1px solid rgba(242,193,46,.25);border-radius:6px;padding:6px 14px;color:var(--gold);font-size:.65rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s}
.ci-copy-btn:hover{background:rgba(242,193,46,.18)}

/* LOGIN CÓDIGO IMPERIAL */
.ci-login-tab{display:flex;gap:8px;margin-bottom:14px}
.ci-tab-btn{flex:1;padding:8px;border-radius:var(--radius-xs);border:1px solid rgba(242,193,46,.15);background:rgba(242,193,46,.04);color:var(--text2);font-size:.65rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif}
.ci-tab-btn.active{background:rgba(242,193,46,.12);border-color:rgba(242,193,46,.3);color:var(--gold)}
@keyframes omiFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.omi-speech-col{flex:1;padding:6px 10px 12px 12px;display:flex;flex-direction:column;justify-content:flex-end;z-index:2}
.omi-speech-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.omi-brand{font-size:.52rem;font-weight:900;letter-spacing:.14em;color:rgba(242,193,46,.5);text-transform:uppercase}
.omi-pill{font-size:.5rem;font-weight:900;padding:2px 8px;border-radius:20px;background:rgba(242,193,46,.1);border:1px solid rgba(242,193,46,.2);color:rgba(242,193,46,.7)}
.omi-pill.vip{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3);color:#c4b5fd}
.omi-msg{background:rgba(255,255,255,.05);border:1px solid rgba(242,193,46,.1);border-radius:4px 14px 14px 14px;padding:10px 13px;font-size:.75rem;line-height:1.65;color:rgba(232,223,200,.88)}
.drawer-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.di-num{font-size:.55rem;font-weight:700;color:var(--text3);width:22px;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace}
.di-info{flex:1;min-width:0}
.di-tipo{font-size:.5rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.di-name{font-size:.8rem;font-weight:800;color:var(--text)}
.di-sub{font-size:.58rem;color:var(--text3)}
.di-price{font-size:.82rem;font-weight:700;color:var(--gold);white-space:nowrap;font-family:'DM Mono',monospace}
.drawer-divider{height:1px;background:rgba(255,255,255,.04);margin:10px 0}
.drawer-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.8rem}
.desc-row{color:#4ade80;font-weight:700;font-size:.72rem}
.cashback-box{background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.15);border-radius:var(--radius-sm);padding:9px 13px;margin:8px 0}
.cashback-label{font-size:.65rem;font-weight:900;color:#4ade80;margin-bottom:3px}
.cashback-calc{font-size:.88rem;font-weight:700;color:rgba(255,255,255,.7)}
.total-box{display:flex;justify-content:space-between;align-items:center;background:rgba(242,193,46,.06);border:1px solid rgba(242,193,46,.12);border-radius:var(--radius-sm);padding:11px 15px;margin-top:8px}
.total-label{font-weight:900;font-size:.64rem;letter-spacing:.12em;color:rgba(242,193,46,.5);text-transform:uppercase}
.total-val{font-weight:700;font-size:1.4rem;color:var(--gold);font-family:'DM Mono',monospace}
.split-bar{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;margin-top:14px;background:rgba(5,14,8,.6);border:1px solid rgba(242,193,46,.15);border-radius:var(--radius-sm);overflow:hidden}
.split-bar-div{background:rgba(242,193,46,.12);width:1px;height:100%}
.btn-omi-split{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 10px;background:transparent;border:none;color:var(--gold);font-weight:900;font-size:.72rem;letter-spacing:.08em;cursor:pointer;transition:.2s;width:100%}
.btn-omi-split:hover{background:rgba(242,193,46,.08)}
.btn-omi-split .split-label{font-size:.6rem;color:var(--text2);font-weight:700;letter-spacing:.06em}
.btn-wa-split{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px 10px;background:transparent;border:none;color:#25D366;font-weight:900;font-size:.72rem;letter-spacing:.08em;cursor:pointer;transition:.2s;width:100%}
.btn-wa-split:hover{background:rgba(37,211,102,.08)}
.btn-wa-split .split-label{font-size:.6rem;color:var(--text2);font-weight:700;letter-spacing:.06em}
.close-btn{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);font-weight:700;font-size:.75rem;padding:10px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.06);width:100%;margin-top:8px;transition:.15s;cursor:pointer}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(4px);background:rgba(10,26,16,.95);border:1px solid rgba(242,193,46,.2);padding:10px 20px;border-radius:30px;color:var(--gold);font-size:.75rem;font-weight:700;opacity:0;pointer-events:none;transition:all .3s;z-index:500;max-width:90vw;text-align:center;backdrop-filter:blur(8px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tracking-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;visibility:hidden;opacity:0;transition:.25s}
.tracking-modal.show{visibility:visible;opacity:1}
.tracking-card{background:linear-gradient(145deg,#0d1f14,#081410);max-width:440px;width:100%;border-radius:20px;border:1px solid rgba(242,193,46,.2);padding:24px;box-shadow:var(--shadow)}
.tracking-card h3{font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold);margin-bottom:6px;font-size:1.2rem}
.tracking-card p{font-size:.7rem;color:var(--text3);margin-bottom:14px}
.tracking-id{background:rgba(242,193,46,.06);border:1px solid rgba(242,193,46,.15);border-radius:var(--radius-xs);padding:9px 14px;font-family:'DM Mono',monospace;font-size:.82rem;color:var(--gold);margin-bottom:16px}
.track-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.tstep{display:flex;align-items:center;gap:12px;opacity:.25;transition:.2s}
.tstep.active{opacity:1}
.tstep-icon{width:30px;height:30px;background:rgba(242,193,46,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.tstep.active .tstep-icon{background:var(--gold);color:var(--green)}
.tstep-label{font-size:.76rem;font-weight:700}
.track-actions{display:flex;gap:8px;flex-wrap:wrap}
.track-actions button{flex:1;background:var(--gold);border:none;padding:10px 14px;border-radius:20px;font-weight:900;color:var(--green);font-size:.8rem;transition:.15s;cursor:pointer}
.track-actions button.sec{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08)}
@media(max-width:560px){.row2,.cgrid{grid-template-columns:1fr}}

/* SLOTS DA JORNADA */
.slot-row{display:flex;gap:3px;width:100%;margin-bottom:6px}
.slot{flex:1;height:60px;border-radius:6px;overflow:hidden;position:relative;box-sizing:border-box}
.slot img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;display:block}
.slot-inner{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}

.sh-icon{
  width:44px;height:44px;flex-shrink:0;
  background:var(--sprite) no-repeat;
  background-size:400% 200%;
  filter:drop-shadow(0 0 8px rgba(242,193,46,.5));
  border-radius:6px;
}
/* col1=0%  col2=33.33%  col3=66.67%  col4=100%  / row1=0%  row2=100% */
.sh-icon.ic-burger  {background-position:33.33% 0%}
.sh-icon.ic-fries   {background-position:66.67% 0%}
.sh-icon.ic-scooter {background-position:100%   0%}
.sh-icon.ic-jar     {background-position:0%     100%}
.sh-icon.ic-box     {background-position:33.33% 100%}
.sh-icon.ic-scroll  {background-position:66.67% 100%}
.sh-icon.ic-bag     {background-position:100%   100%}
.sh-icon.ic-cake    {background-position:0%     0%}


/* JORNADA PIPS */
.jpips-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px}
.jpip{
  aspect-ratio:1;border-radius:50%;position:relative;
  border:2px solid rgba(242,193,46,.18);
  background:rgba(0,0,0,.4) center/112% no-repeat;
  transition:all .25s;cursor:default;
  opacity:.18;filter:grayscale(1) brightness(.65);
}
.jpip.atual{
  border-color:rgba(242,193,46,.5);
  opacity:.55;filter:grayscale(.4);
  animation:jpipPulse 2s ease-in-out infinite;
}
.jpip.feito{
  border-color:rgba(242,193,46,.85);
  box-shadow:0 0 11px rgba(242,193,46,.3);
  opacity:1;filter:none;
}
.jpip.feito.cash{border-color:#4ade80;box-shadow:0 0 11px rgba(74,222,128,.4)}
.jpip.feito.premio{border-color:#4ade80;box-shadow:0 0 14px rgba(74,222,128,.55)}
.jpip-num{
  position:absolute;bottom:1px;right:3px;
  font-size:.42rem;font-weight:900;
  color:rgba(242,193,46,.45);font-family:'DM Mono',monospace;
  line-height:1;pointer-events:none;
}
.jpip.feito .jpip-num{color:rgba(242,193,46,.8)}
@keyframes jpipPulse{0%,100%{box-shadow:0 0 2px rgba(242,193,46,.15)}50%{box-shadow:0 0 14px rgba(242,193,46,.55)}}


/* PWA INSTALL BANNER */
.pwa-banner{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:90;background:linear-gradient(135deg,rgba(6,38,29,.97),rgba(5,14,8,.97));border:1px solid rgba(242,193,46,.3);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:340px;width:90%;animation:slideUp .4s ease}
.pwa-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0}
.pwa-text{flex:1}
.pwa-title{font-weight:900;font-size:.8rem;color:var(--gold);letter-spacing:.05em}
.pwa-sub{font-size:.65rem;color:var(--text2);margin-top:1px}
.pwa-btn{background:var(--gold);border:none;border-radius:8px;padding:7px 14px;font-weight:900;font-size:.7rem;color:#050e08;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pwa-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:2px 4px;flex-shrink:0}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── ENTRANCE REDESIGN ─────────────────────── */
.entrada-wrap{display:flex;flex-direction:column;gap:0;padding:0}
.entrada-hero{text-align:center;padding:28px 20px 20px}
.entrada-crown{font-size:3.2rem;filter:drop-shadow(0 0 20px rgba(242,193,46,.5));margin-bottom:10px}
.entrada-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);line-height:1.1;margin-bottom:6px}
.entrada-tagline{font-size:.72rem;color:var(--text2);letter-spacing:.16em;text-transform:uppercase}
.entrada-divider{display:flex;align-items:center;gap:10px;padding:0 20px;margin:4px 0}
.entrada-divider::before,.entrada-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.entrada-divider span{font-size:.6rem;color:var(--text2);letter-spacing:.12em;white-space:nowrap}
.entrada-opcoes{display:flex;flex-direction:column;gap:10px;padding:0 16px 20px}
.entrada-btn-novo{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;letter-spacing:.1em;color:#050e08;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.entrada-btn-novo:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(242,193,46,.25)}
.entrada-btn-retorno{width:100%;padding:15px;background:rgba(242,193,46,.06);border:1px solid rgba(242,193,46,.25);border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.08em;color:var(--gold);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.entrada-btn-retorno:hover{background:rgba(242,193,46,.12)}
.entrada-beneficios{display:flex;justify-content:center;gap:20px;padding:0 16px 20px}
.beneficio-item{text-align:center}
.beneficio-icon{font-size:1.2rem;margin-bottom:3px}
.beneficio-txt{font-size:.6rem;color:var(--text2);letter-spacing:.06em;line-height:1.3}

/* ── FORM REDESIGN ─────────────────────────── */
.form-card{padding:20px 16px}
.form-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.form-back{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text2);cursor:pointer;font-size:.75rem}
.form-back:hover{border-color:rgba(242,193,46,.3);color:var(--gold)}
.form-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--gold)}
.form-subtitle{font-size:.68rem;color:var(--text2);line-height:1.5;margin-bottom:16px;padding-left:2px}
.inp-group{margin-bottom:14px}
.inp-group label{display:block;font-size:.6rem;font-weight:900;letter-spacing:.14em;color:var(--text2);text-transform:uppercase;margin-bottom:5px;font-family:'DM Mono',monospace}
.inp-group input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp-group input:focus{border-color:rgba(242,193,46,.4)}
.inp-group input::placeholder{color:rgba(232,223,200,.25)}
.inp-hint{font-size:.62rem;color:var(--text2);margin-top:4px;opacity:.7}
.inp-btn{width:100%;margin-top:6px;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;letter-spacing:.1em;color:#050e08;cursor:pointer;transition:all .2s}
.inp-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(242,193,46,.2)}
.inp-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── RECOVERY FORM ─────────────────────────── */
.recovery-info{background:rgba(242,193,46,.05);border:1px solid rgba(242,193,46,.15);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px;font-size:.72rem;color:var(--text2);line-height:1.5}
.recovery-info strong{color:var(--gold)}


.plano-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 14px}
.plano-card{background:rgba(11,38,25,.6);border:1px solid rgba(242,193,46,.12);border-radius:var(--radius-sm);padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:7px}
.plano-icon-wrap{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,rgba(242,193,46,.18),rgba(242,193,46,.04));border:1.5px solid rgba(242,193,46,.35);display:flex;align-items:center;justify-content:center}
.plano-label{font-size:.56rem;font-weight:900;letter-spacing:.14em;color:var(--gold);text-align:center}
.plano-row{display:flex;align-items:center;gap:5px;background:rgba(242,193,46,.05);border:1px solid rgba(242,193,46,.1);border-radius:6px;padding:5px 7px;width:100%}
.plano-row-icon{font-size:.65rem;flex-shrink:0;line-height:1;display:flex;align-items:center}
.plano-row-txt{font-size:.54rem;font-weight:700;color:var(--text);line-height:1.2}
.vantagens-banner{margin:0 16px 12px;background:rgba(11,38,25,.7);border:1px solid rgba(242,193,46,.18);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.2s}
.vantagens-banner:hover{border-color:rgba(242,193,46,.3)}
.vantagens-icon{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle,rgba(242,193,46,.2),rgba(242,193,46,.05));border:1.5px solid rgba(242,193,46,.3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.vantagens-info{flex:1;min-width:0}

const SUPA_URL='https://ppnrmrnkpmzpufppdzwf.supabase.co';
const SUPA_KEY='sb_publishable_ZxPkeXTseIayHdi40I5AXQ_vpOcHgRb';

// ── SUPABASE SYNC ──────────────────────────────────────
async function supaLoad(whats){
  if(!whats) return null;
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/clientes?whatsapp=eq.${encodeURIComponent(whats)}&select=*`,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    const d=await r.json();
    return d&&d.length>0?d[0]:null;
  }catch(e){return null;}
}

async function supaSave(codigoImperial){
  if(!clienteWhats) return;
  const ci = codigoImperial || gerarCodigoImperial(clienteAniv, clienteWhats);
  const payload={
    whatsapp: clienteWhats,
    nome: clienteNome,
    aniversario: clienteAniv||null,
    endereco: clienteEnd||null,
    fase: fase,
    total_pedidos: totalPedidosPagos||0,
    cromi_acumulado: cromiAcumulado||0,
    selos: JSON.stringify(selosPedidos||{}),
    desconto_usado: desconto||false,
    premio_hamburguer: premioHamburguerPendente||false,
    premio_combo: premioComboPendente||false,
    membro_coroa: membroCoroa||false,
    codigo_imperial: ci||null,
    ultimo_pedido: new Date().toISOString()
  };
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/clientes`,{
      method:'POST',
      headers:{
        'apikey':SUPA_KEY,
        'Authorization':'Bearer '+SUPA_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body:JSON.stringify(payload)
    });
    if(!r.ok){
      const err=await r.text();
      console.error('supaSave error:',r.status,err);
      showToast('⚠️ Sync: '+r.status);
    }
  }catch(e){
    console.error('supaSave catch:',e);
    showToast('⚠️ Sem conexão com banco');
  }
}

async function supaLoadCliente(){
  if(!clienteWhats) return;
  const d=await supaLoad(clienteWhats);
  if(!d) return; // novo cliente, sem verificação
  // cliente existente — verificar data de nascimento
  const anivInput=document.getElementById('inp-aniv')?.value||'';
  if(d.aniversario && anivInput && d.aniversario!==anivInput){
    showToast('⚠️ Data de nascimento não confere!');
    return;
  }
  // verificação passou — carrega dados
  clienteNome=d.nome||clienteNome;
  clienteAniv=d.aniversario||clienteAniv;
  clienteEnd=d.endereco||clienteEnd;
  fase=d.fase||fase;
  totalPedidosPagos=d.total_pedidos||0;
  cromiAcumulado=d.cromi_acumulado||0;
  selosPedidos=JSON.parse(d.selos||'{}');
  desconto=d.desconto_usado||false;
  premioHamburguerPendente=d.premio_hamburguer||false;
  premioComboPendente=d.premio_combo||false;
  membroCoroa=d.membro_coroa||false;
  showToast('👑 Bem-vindo de volta, '+clienteNome+'!');
}

function fmtVal(v){return `R$ ${v.toFixed(2).replace('.',',')}`}
function formatarZap(v){const n=v.replace(/\D/g,'');if(n.length<=2)return n;if(n.length<=7)return `(${n.slice(0,2)}) ${n.slice(2)}`;if(n.length<=11)return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`;return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7,11)}`}
function formatarAniv(v){const d=v.replace(/\D/g,'').slice(0,4);return d.length<=2?d:d.slice(0,2)+'/'+d.slice(2)}
let _tt;function showToast(msg){clearTimeout(_tt);const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');_tt=setTimeout(()=>t.classList.remove('show'),2800)}
function getTaxaEntrega(){return membroCoroa?0:1.99}
function getDescontoAutomatico(){
 const sub=getBagSubtotal();
 if(membroCoroa){let d=0;if(cromiAcumulado>=11.90)d+=11.90;if(clienteAniv){const pts=clienteAniv.split('/');if(pts.length===2){const di=parseInt(pts[0]),me=parseInt(pts[1]),hj=new Date();if(hj.getDate()===di&&hj.getMonth()+1===me)d+=11.90;}}return Math.min(d,sub);}
 let d=0;const p=totalPedidosPagos+1;
 const proj=cromiAcumulado+([1,2,3,4,8,9,10].includes(p)?1.49:0);
 if(p===4&&proj>=5.96)d+=5.96;else if(p===10&&proj>=4.47)d+=4.47;
 if(premioHamburguerPendente)d+=17.90;if(premioComboPendente)d+=26.90;
 return Math.min(d,sub);
}
function getBagItems(){return Object.values(bag).filter(i=>i.qty>0)}
function getBagCount(){return getBagItems().reduce((s,i)=>s+i.qty,0)}
function getBagSubtotal(){return getBagItems().reduce((s,i)=>s+(i.preco*i.qty),0)}
function getBagTotal(){let s=getBagSubtotal();if(descontoAtivo&&!descontoUsado)s*=0.9;s-=getDescontoAutomatico();s+=getTaxaEntrega();return Math.max(0,s)}

function omiExpr(orders){
 const p=orders+1;
 if(orders===0)return OMI_EXPR.feliz;
 if(p===4||p===10)return OMI_EXPR.pensando;
 if(p===7||p===12)return OMI_EXPR.surpreso;
 if(orders>=12)return OMI_EXPR.feliz;
 const items=getBagItems();
 const hasSimplesBurger=items.some(i=>hamburgers.find(h=>h.id===i.id)&&i.sub==='Simples');
 const hasBatata150=items.some(i=>i.id==='batata150');
 const hasCroc6=items.some(i=>i.id==='croc6');
 if(hasSimplesBurger&&items.length===1)return OMI_EXPR.atento;
 if((hasBatata150||hasCroc6)&&items.length===1)return OMI_EXPR.atento;
 return OMI_EXPR.atento;
}
function omiMsg(nome,orders){
  const items=getBagItems();
  const nome1=nome?(nome.split(' ')[0]):'cidadão';

  // Analyze order history for personalization
  const selos=selosPedidos||{};
  const pedidos=Object.values(selos);
  const contagem={};
  pedidos.forEach(s=>{contagem[s]=(contagem[s]||0)+1;});
  const favorito=Object.keys(contagem).sort((a,b)=>contagem[b]-contagem[a])[0];
  const nomesFav={real:'DOHN\'MI REAL',nobre:'DOHN\'MI NOBRE',imperador:'DOHN\'MI IMPERADOR',supremo:'DOHN\'MI SUPREMO',paraiso:'DOHN\'MI PARAÍSO',alteza:'DOHN\'MI ALTEZA',soberano:'COMBO SOBERANO',monarca:'COMBO MONARCA',imperio:'COMBO IMPÉRIO',dameCombo:'DAME COMBO',dameBatata:'DAME BATATA',dameFrango:'DAME FRANGO'};
  const favNome=favorito?nomesFav[favorito]||favorito:null;

  // First visit
  if(orders===0){
    return `Saudações, nobre ${nome1}. Sou O-Mi, cavaleiro guardião do Império DOHN'MI. 🛡️ Estou aqui para guiar sua jornada e garantir que cada decreto seu seja executado com honra. Por onde deseja começar?`;
  }

  // Returning client with history
  if(orders>0 && favNome){
    const frases=[
      `Bem-vindo de volta, ${nome1}! 👑 Seu legado no Império cresce a cada visita. Seu paladar sempre soube o que quer — o ${favNome} te aguarda como sempre.`,
      `A coroa reconhece sua presença, ${nome1}. 🛡️ ${orders} pedidos de lealdade. O ${favNome} segue como seu decreto favorito — deseja repeti-lo hoje?`,
      `${nome1}, o Império saúda seu retorno! ⚔️ Seu histórico fala por si — ${favNome} é sua escolha de confiança. Mas os outros decretos também merecem sua atenção.`,
    ];
    return frases[orders%frases.length];
  }

  // Milestone messages — knight style
  const p=orders+1;
  if(p===4)return`⚜️ O CASHCROMI foi invocado, ${nome1}! R$5,96 de desconto imperial aplicado automaticamente neste pedido.`;
  if(p===7)return`🏆 A recompensa imperial desperta, ${nome1}! Sua lealdade foi reconhecida — um hambúrguer aguarda como oferenda da Coroa.`;
  if(p===10)return`⚜️ Os cofres do reino se abrem, ${nome1}! R$4,47 em CROMI disponíveis — a Coroa recompensa quem permanece fiel.`;
  if(p===12)return`👑 A Jornada dos Sabores está completa, ${nome1}! Você conquistou o título de Membro da Coroa. O Império inclina-se diante de sua lealdade.`;
  if(orders>=12)return`🛡️ Membro da Coroa ${nome1}, seu lugar no Império é eterno. Cada pedido fortalece o reino. Qual decreto imperial você escolhe hoje?`;

  // Generic encouraging messages by order number
  const encorajamento=[
    `Seu pedido #${p} se aproxima, ${nome1}. ⚔️ A Jornada dos Sabores está apenas começando.`,
    `${nome1}, o Império acompanha cada escolha sua. 👑 Pedido ${p} de 12 — continue e a Coroa reservará grandes recompensas.`,
    `Nobre ${nome1}, ${12-orders} decretos separam você do título de Membro da Coroa. 🛡️ O reino aguarda com honra.`,
  ];
  return encorajamento[orders%encorajamento.length];
}

async function finalizarPedidoOMI(){

    cliente_end: clienteEnd||null,

    total: total,
    status: 'novo'
  };

  // Histórico do cliente para personalização
  const selosAtivos = Object.keys(selosPedidos||{}).length;
  const faltamSelos = Math.max(0, 7 - selosAtivos);
  const contagem={};
  Object.values(selosPedidos||{}).forEach(s=>{contagem[s]=(contagem[s]||0)+1;});
  const favorito=Object.keys(contagem).sort((a,b)=>contagem[b]-contagem[a])[0];
  const nomeFav={real:"REAL",nobre:"NOBRE",imperador:"IMPERADOR",supremo:"SUPREMO",paraiso:"PARAÍSO",alteza:"ALTEZA"};

  // Saudação personalizada baseada no contexto real do cliente

  } else if(membroCoroa){
    saudacao = `${nome1}, Membro da Coroa. 👑 Que bom te ver de volta. Já separei tudo certinho para você.`;
  } else if(faltamSelos===1){
    saudacao = `${nome1}! Falta 1 selo para o seu hambúrguer grátis. 🎁 Este pedido pode ser o decisivo. Vamos lá!`;
  } else if(favorito && nomeFav[favorito] && snap.some(i=>i.id===favorito)){

  } else if(totalPedidosPagos>0){

  }

  // Monta itens do pedido
  const itensLinha = snap.map(i=>`• ${i.qty}× ${i.nome}${i.sub?' ('+i.sub+')':''} — ${fmtVal(i.preco*i.qty)}`).join('\n');

  // Monta valores
  let valoresLinha = '';
  if(temDesc) valoresLinha += `Subtotal: ${fmtVal(sub)}\nDesconto −10%: −${fmtVal(sub*0.1)}\n`;
  if(descAuto>0){
    const lbl = premioHamburguerPendente?'Hambúrguer grátis':premioComboPendente?'Combo grátis':'Cashback';
    valoresLinha += `${lbl}: −${fmtVal(descAuto)}\n`;
  }
  if(!membroCoroa) valoresLinha += `Taxa de entrega: R$ 1,99\n`;
  valoresLinha += `Total: ${fmtVal(total)}`;

  const enderecoLinha = clienteEnd
    ? `📍 ${clienteEnd}`
    : `📍 Retirada no local`;

  const msgResumo =
`${saudacao}

Confirme seu decreto:

${enderecoLinha}

${itensLinha}

${valoresLinha}

Como vai preferir pagar?`;

  omiChatMessages=[{role:'assistant', content:msgResumo, expr: totalPedidosPagos===0?'feliz':'atento'}];

    const msgs=document.getElementById('omiChatMsgs');

async function encaminharPedidoFinal(){
  const p=window._omiPedidoAtual;
  if(!p){showToast('Erro: pedido não encontrado');return;}

  // Remove botão
  document.querySelectorAll('#omiChatMsgs button').forEach(b=>{
    if(b.textContent.includes('ENCAMINHAR')) b.closest('div').remove();
  });

  try{
    await fetch(`${SUPA_URL}/rest/v1/omi_pedidos`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({...p, criado_em:new Date().toISOString(), atualizado_em:new Date().toISOString()})
    });
  }catch(e){console.warn('Erro ao enviar pedido',e);}

  // Atualiza progresso do cliente
  if(descontoAtivo&&!descontoUsado) descontoUsado=true;
  const orders=JSON.parse(localStorage.getItem('dohnmi_orders')||'[]');
  orders.unshift({id:p.id,data:new Date().toISOString(),itens:JSON.parse(p.itens),status:'recebido',pagamentoConfirmado:false,avaliado:false});
  localStorage.setItem('dohnmi_orders',JSON.stringify(orders));
  salvar(); supaSave();
  window._omiPedidoAtual=null;

  // Confirmação final do O-Mi
  const nome1=clienteNome.split(' ')[0];
  omiChatMessages.push({
    role:'assistant',
    content:`Pedido encaminhado! 🚀\n\nA cozinha já recebeu, ${nome1}. Assim que confirmarmos eu te aviso aqui mesmo. Pode ficar tranquilo. 👑`,
    expr:'feliz'
  });
  renderOMIChatMessages();
}

let omiChatMessages = [];
let omiChatLoading = false;
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';

function buildOMIContext() {
  const nome1 = clienteNome ? clienteNome.split(' ')[0] : null;
  const items = getBagItems();
  const sub = getBagSubtotal();
  const temDesc = descontoAtivo && !descontoUsado;
  const total = getBagTotal();
  const selosAtivos = Object.keys(selosPedidos||{}).length;
  const horaAtual = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const diaSemana = dias[new Date().getDay()];

  // Hambúrguer favorito
  const contagem = {};
  Object.values(selosPedidos||{}).forEach(s => { contagem[s]=(contagem[s]||0)+1; });
  const favorito = Object.keys(contagem).sort((a,b)=>contagem[b]-contagem[a])[0];
  const nomeFav = {real:"DOHN'MI REAL",nobre:"DOHN'MI NOBRE",imperador:"DOHN'MI IMPERADOR",
    supremo:"DOHN'MI SUPREMO",paraiso:"DOHN'MI PARAÍSO",alteza:"DOHN'MI ALTEZA"};

  let ctx = `CARDÁPIO OFICIAL DOHN'MI\nHAMBÚRGUERES (sem/com bebida): REAL R$18,90/24,90 · NOBRE R$22,90/28,90 · IMPERADOR R$26,90/32,90 · SUPREMO R$29,90/35,90 · PARAÍSO R$33,90/39,90 · ALTEZA R$37,90/43,90\nMOLHOS R$0,99: REAL·COROA·ALTEZA·TROPICAL\nCROCANTÍSSIMOS: 6tiras R$17,90 · 12tiras R$23,90\nBATATAS: 150g R$12,90 · 300g R$17,90\nCOMBOS: Favorito R$25,90 · Crocante R$22,90 · Família R$47,90\n\n`;

  if (nome1) {
    ctx += `CIDADÃO IDENTIFICADO:\n- Nome: ${nome1}\n- Total de pedidos: ${totalPedidosPagos}\n- CROMI acumulado: R$ ${cromiAcumulado.toFixed(2)}\n- Selos: ${selosAtivos}/7\n- Status: ${membroCoroa ? 'MEMBRO DA COROA 👑' : `${7-selosAtivos} selos para hambúrguer grátis`}\n`;
    if (clienteAniv) ctx += `- Aniversário: ${clienteAniv}\n`;
    if (clienteEnd) ctx += `- Endereço: ${clienteEnd}\n`;
    if (favorito && nomeFav[favorito]) ctx += `- Favorito histórico: ${nomeFav[favorito]}\n`;
    if (temDesc) ctx += `- Desconto ativo: -10% neste pedido\n`;
  } else {
    ctx += `CIDADÃO: Não identificado (primeira visita ou não cadastrado)\n`;
  }

  if (items.length > 0) {
    ctx += `\nSACOLA ATUAL:\n`;
    items.forEach(i => { ctx += `• ${i.qty}x ${i.nome}${i.sub?' ('+i.sub+')':''} — R$ ${(i.preco*i.qty).toFixed(2).replace('.',',')}\n`; });
    ctx += `Subtotal: R$ ${sub.toFixed(2).replace('.',',')}`;
    if (temDesc) ctx += ` → com desconto: R$ ${total.toFixed(2).replace('.',',')}`;
    ctx += '\n';
    if (!membroCoroa) ctx += `Taxa de entrega: R$ 1,99\nTotal final: R$ ${total.toFixed(2).replace('.',',')}\n`;
  } else {
    ctx += `\nSACOLA: Vazia\n`;
  }

  ctx += `\nHorário: ${horaAtual} · ${diaSemana}`;
  return ctx;
}

function buildOMISystemPrompt() {
  return `Você é O-MI, assistente inteligente do Império DOHN'MI. Personalidade: acolhedor, próximo, com leve toque imperial. Respostas curtas — máximo 3 linhas (exceto quando listar cardápio completo). Use linguagem da marca: clientes = cidadãos, produtos = decretos.

${buildOMIContext()}

REGRAS: Nunca invente preços. Se o cidadão quiser fazer um pedido, oriente-o a usar os itens na tela. Termine sempre com ||expr:VALOR|| onde VALOR é: feliz, atento, pensando ou surpreso.`;
}

function openOMIChat() {
  const modal = document.getElementById('omiChatModal');
  modal.classList.add('open');

  // Set avatar
  const avatar = document.getElementById('omiChatAvatar');
  avatar.src = omiExpr(totalPedidosPagos);

  // Sub line
  const sub = document.getElementById('omiChatSub');
  if (clienteNome) sub.textContent = `OLÁS, ${clienteNome.split(' ')[0].toUpperCase()} · DOHN'MI`;

  // Init with greeting if empty
  if (omiChatMessages.length === 0) {
    const greeting = clienteNome
      ? `Saudações, ${clienteNome.split(' ')[0]}! 👑 Como posso te ajudar hoje?`
      : `Saudações! Sou O-Mi, guardião do Império DOHN'MI. Como posso servir?`;
    omiChatMessages = [{role:'assistant', content:greeting, expr:'feliz'}];
  }

  renderOMIChatMessages();

  // Enable input
  const input = document.getElementById('omiChatInput');
  input.addEventListener('input', () => {
    document.getElementById('omiChatSendBtn').disabled = !input.value.trim();
  });
  setTimeout(() => input.focus(), 300);
}

function closeOMIChat() {
  document.getElementById('omiChatModal').classList.remove('open');
}

function renderOMIChatMessages() {
  const container = document.getElementById('omiChatMsgs');
  const avatar = omiExpr(totalPedidosPagos);
  let html = '';
  omiChatMessages.forEach(m => {
    if (m.role === 'assistant') {
      html += `<div class="omi-cm-bubble omi"><div class="omi-bubble-avatar"><img src="${avatar}" alt="O-Mi"/></div><div class="omi-bubble-text">${m.content.replace(/\n/g,'<br>')}</div></div>`;
    } else {
      html += `<div class="omi-cm-bubble user">${m.content.replace(/\n/g,'<br>')}</div>`;
    }
  });
  if (omiChatLoading) {
    html += `<div class="omi-cm-typing"><div class="omi-typing-dots"><span></span><span></span><span></span></div></div>`;
  }
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

async function omiChatSend() {
  const input = document.getElementById('omiChatInput');
  const msg = (input.value || '').trim();
  if (!msg || omiChatLoading) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('omiChatSendBtn').disabled = true;

  omiChatMessages.push({role:'user', content:msg});
  omiChatLoading = true;
  renderOMIChatMessages();

  try {
    const apiMessages = omiChatMessages.map(m => ({
      role: m.role,
      content: m.role === 'assistant' ? m.content + (m.expr ? ` ||expr:${m.expr}||` : '') : m.content
    }));

    const res = await fetch(CLAUDE_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: buildOMISystemPrompt(),
        messages: apiMessages
      })
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const raw = data.content?.[0]?.text || '...';
    const match = raw.match(/\|\|expr:(\w+)\|\|/);
    const expr = match ? match[1] : 'atento';
    const text = raw.replace(/\|\|expr:\w+\|\|/, '').trim();

    omiChatMessages.push({role:'assistant', content:text, expr});

    // Update avatar based on expression
    const avatar = document.getElementById('omiChatAvatar');
    const exprMap = {feliz:'feliz',atento:'atento',pensando:'pensando',surpreso:'surpreso'};
    if (OMI_EXPR[exprMap[expr]]) avatar.src = OMI_EXPR[exprMap[expr]];

  } catch(e) {
    omiChatMessages.push({role:'assistant', content:'Houve uma falha na conexão com o Império. Tente novamente.', expr:'surpreso'});
  } finally {
    omiChatLoading = false;
    renderOMIChatMessages();
  }
}

function mostrarFormRetorno(){
  // Show recovery form inline
  const card=document.querySelector('.card-cupom,.entrada-wrap,.form-card');

  const wrap=document.querySelector('#fidelidade-wrap,#recovery-form') || document.querySelector('.papiro');
  const target=document.getElementById('recovery-form') || wrap;
  if(target) target.innerHTML=htmlRetorno();
  bindFormsRetorno();
}

        <label>WhatsApp</label>

function switchTab(tab){
  document.getElementById('tab-zap').classList.toggle('active',tab==='zap');
  document.getElementById('tab-ci').classList.toggle('active',tab==='ci');
  document.getElementById('rec-form-zap').style.display=tab==='zap'?'block':'none';
  document.getElementById('rec-form-ci').style.display=tab==='ci'?'block':'none';
}

async function confirmarRetornoCodigo(){
  const btn=document.getElementById('rec-ci-btn');
  const raw=(document.getElementById('rec-ci')?.value||'').replace(/\D/g,'');
  if(raw.length!==8){showToast('Código Imperial tem 8 dígitos');return;}
  btn.disabled=true;btn.textContent='Verificando...';
  // Extract DD/MM and last4
  const dia=raw.slice(0,2);const mes=raw.slice(2,4);const last4=raw.slice(4);
  const anivCheck=dia+'/'+mes;
  // Search Supabase: find client with matching aniversario where whatsapp ends in last4
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/clientes?aniversario=eq.${encodeURIComponent(anivCheck)}&select=*`,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    const lista=await r.json();
    const d=lista.find(c=>c.whatsapp&&c.whatsapp.replace(/\D/g,'').slice(-4)===last4);
    if(!d){
      btn.disabled=false;btn.textContent='Entrar com Código Imperial';
      showToast('⚠️ Código Imperial não encontrado');return;
    }
    clienteWhats=d.whatsapp;clienteNome=d.nome||'';clienteAniv=d.aniversario||'';
    clienteEnd=d.endereco||'';fase=d.fase||'jornada';
    totalPedidosPagos=d.total_pedidos||0;cromiAcumulado=d.cromi_acumulado||0;
    selosPedidos=JSON.parse(d.selos||'{}');descontoAtivo=!d.desconto_usado;
    descontoUsado=d.desconto_usado||false;premioHamburguerPendente=d.premio_hamburguer||false;
    premioComboPendente=d.premio_combo||false;membroCoroa=d.membro_coroa||false;
    salvar();showToast('👑 Bem-vindo de volta, '+clienteNome.split(' ')[0]+'!');
    setTimeout(()=>{renderCardContent();updateBagBar();},800);
  }catch(e){
    btn.disabled=false;btn.textContent='Entrar com Código Imperial';
    showToast('Erro ao verificar. Tente novamente.');
  }
}

function bindFormsRetorno(){
  const z=document.getElementById('rec-zap');
  const a=document.getElementById('rec-aniv');
  if(z) z.addEventListener('input',()=>{
    z.value=z.value.replace(/\D/g,'').replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  });
  if(a) a.addEventListener('input',()=>{
    a.value=a.value.replace(/\D/g,'').replace(/(\d{2})(\d{2})/,'$1/$2');
  });
}

async function confirmarRetorno(){
  const btn=document.getElementById('rec-btn');
  const z=(document.getElementById('rec-zap')?.value||'').replace(/\D/g,'');
  const a=document.getElementById('rec-aniv')?.value||'';
  if(z.length<10){showToast('Digite seu WhatsApp');return;}
  if(!a||a.length<4){showToast('Digite sua data de nascimento');return;}
  btn.disabled=true;btn.textContent='Verificando...';
  const d=await supaLoad(z);
  if(!d){
    btn.disabled=false;btn.textContent='Recuperar minha conta';
    showToast('⚠️ WhatsApp não encontrado. Faça o cadastro.');
    setTimeout(()=>mostrarFormNovo(),2000);
    return;
  }
  if(d.aniversario&&d.aniversario!==a){
    btn.disabled=false;btn.textContent='Recuperar minha conta';
    showToast('⚠️ Data de nascimento incorreta');
    return;
  }
  // Restore all data
  clienteWhats=z;clienteNome=d.nome||'';clienteAniv=d.aniversario||a;
  clienteEnd=d.endereco||'';fase=d.fase||'jornada';
  totalPedidosPagos=d.total_pedidos||0;cromiAcumulado=d.cromi_acumulado||0;
  selosPedidos=JSON.parse(d.selos||'{}');desconto=d.desconto_usado||false;
  premioHamburguerPendente=d.premio_hamburguer||false;
  premioComboPendente=d.premio_combo||false;membroCoroa=d.membro_coroa||false;
  salvar();
  showToast('👑 Bem-vindo de volta, '+clienteNome.split(' ')[0]+'!');
  setTimeout(()=>{renderCardContent();updateBagBar();},800);
}

function bindForms(){const ni=document.getElementById('inp-nome'),zi=document.getElementById('inp-zap'),ai=document.getElementById('inp-aniv'),ei=document.getElementById('inp-end');if(ni&&clienteNome)ni.value=clienteNome;if(zi&&clienteWhats)zi.value=clienteWhats;if(ai&&clienteAniv)ai.value=clienteAniv;if(ei&&clienteEnd)ei.value=clienteEnd;if(zi)zi.addEventListener('input',e=>{e.target.value=formatarZap(e.target.value.replace(/\D/g,''));});if(ai)ai.addEventListener('input',e=>{e.target.value=formatarAniv(e.target.value);});}
async function confirmarCadastro(){const n=(document.getElementById('inp-nome')?.value||'').trim();const z=(document.getElementById('inp-zap')?.value||'').replace(/\D/g,'');if(!n||z.length<10){showToast('Preencha nome e WhatsApp!');return;}clienteNome=n;clienteWhats=z;clienteAniv=document.getElementById('inp-aniv')?.value||'';clienteEnd=document.getElementById('inp-end')?.value||'';const clienteExistente=await supaLoad(clienteWhats);if(clienteExistente&&clienteExistente.aniversario&&clienteAniv&&clienteExistente.aniversario!==clienteAniv){showToast('⚠️ Data de nascimento não confere!');clienteWhats='';return;}if(clienteExistente){await supaLoadCliente();}descontoAtivo=!clienteExistente;descontoUsado=clienteExistente?clienteExistente.desconto_usado:false;if(!clienteExistente){fase='jornada';}salvar();updateBagBar();
  // Gera Código Imperial internamente e salva no Supabase
  const _ci=gerarCodigoImperial(clienteAniv,clienteWhats);
  supaSave(_ci);
  fase='jornada';renderCardContent();
  showToast(' Cadastro ativo! −10% no próximo pedido');}
function gerarCodigoImperial(aniv, whats){
  if(!aniv||!whats) return null;
  const pts=aniv.split('/');
  if(pts.length<2) return null;
  const d=pts[0].padStart(2,'0');
  const m=pts[1].padStart(2,'0');
  const ultimos4=whats.replace(/\D/g,'').slice(-4);
  return d+m+ultimos4;
}

function formatarCodigo(code){
  if(!code||code.length!==8) return code||'';
  return code.slice(0,4)+' '+code.slice(4);
}

function copiarCodigo(){
  const code=gerarCodigoImperial(clienteAniv,clienteWhats)||'';
  if(navigator.clipboard){navigator.clipboard.writeText(code).then(()=>showToast('Código copiado!'));}
  else{showToast(code);}
}

function resetApp(){if(!confirm('Resetar todo o progresso?'))return;['dohnmi_v12','dohnmi_orders'].forEach(k=>localStorage.removeItem(k));location.reload();}
function init(){carregar();
  // Auto-sync from Supabase if we have a saved WhatsApp
  if(clienteWhats){
    supaLoad(clienteWhats).then(d=>{
      if(!d) return;
      fase=d.fase||fase;
      totalPedidosPagos=d.total_pedidos||totalPedidosPagos;
      cromiAcumulado=d.cromi_acumulado||cromiAcumulado;
      selosPedidos=JSON.parse(d.selos||'{}');
      desconto=d.desconto_usado||desconto;
      premioHamburguerPendente=d.premio_hamburguer||premioHamburguerPendente;
      premioComboPendente=d.premio_combo||premioComboPendente;
      membroCoroa=d.membro_coroa||membroCoroa;
      salvar();
      renderCardContent();
      updateBagBar();
    }).catch(()=>{});
  }
  renderCardContent();renderBurgers();renderSimpleGrid('crocGrid',croc,'rc');renderSimpleGrid('porcoesGrid',porcoes,'rc');renderSimpleGrid('molhosGrid',molhos,'molho');renderSimpleGrid('combosGrid',combos,'combo');updateBagBar();}
init();
